// Raid spread-over-time curve: the squishy-cohort spread radius (yd) across the fight, ours vs benchmark, on
// the SAME absolute-seconds axis as the DPS curves above — so a spike (the raid scattering, often a mechanic)
// lines up with where DPS dipped. Null buckets (too few actors sampled) break the line into segments rather
// than drawing through a gap. Frame-independent metric (within-raid spacing), so it's valid on every boss.
function spreadChart(o,t,m1,m2){
  const OUR="#4ea1ff",THEIR="#e268a8",GRID="#262f40",MUT="#8a96aa";
  const W=1000,padL=48,padR=14,padT=16,plotW=W-padL-padR,plotH=140,axisY=padT+plotH;
  o=asArr(o); t=asArr(t);
  const nums=[...o,...t].filter(v=>v!=null).map(Number);
  if(nums.length<2) return "";
  const max=Math.max(1,...nums)*1.12;
  const oDur=m1.durSec||0, tDur=m2.durSec||0, axisMax=Math.max(oDur,tDur,1);
  const H=axisY+40;
  const Y=v=>padT+plotH-(v/max)*plotH;
  const Xs=sec=>padL+(Math.max(0,Math.min(axisMax,sec))/axisMax)*plotW;
  const pathFor=(a,dur)=>{const n=a.length; let d="",pen=false;
    for(let i=0;i<n;i++){const v=a[i]; if(v==null){pen=false;continue;}
      const x=Xs(n>1?i/(n-1)*dur:0), y=Y(Number(v));

    return d.trim();};
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;height:auto;max-width:100%">`;
  for(let g=0;g<=4;g++){const yy=axisY-(g/4)*plotH;
    s+=`<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${W-padR}" y2="${yy.toFixed(1)}" stroke="${GRID}"/>`+
       `<text x="${padL-6}" y="${(yy+3.5).toFixed(1)}" fill="${MUT}" font-size="11" text-anchor="end">${Math.round(max*g/4)}yd</text>`;}
  for(let g=0;g<=4;g++){const sec=axisMax*g/4, xx=Xs(sec);s+=`<text x="${xx.toFixed(1)}" y="${axisY+31}" fill="${MUT}" font-size="11" text-anchor="middle">${fmtTime(sec*1000)}</text>`;}
  s+=`<path d="${pathFor(t,tDur)}" fill="none" stroke="${THEIR}" stroke-width="2" opacity=".85"/>`;
  s+=`<path d="${pathFor(o,oDur)}" fill="none" stroke="${OUR}" stroke-width="2.3"/>`;
  return s+`</svg>`;
}
function spreadView(b){

// One reusable mirrored-bar grid (the report's horizontal ours←|→theirs idiom), so the layout lives in

//   label, oTitle, tTitle  — header (titles default to the loaded raids)
//   ours(r), theirs(r)     — numeric values driving bar widths (and the default max)

//   sub(r)   -> html       — full-width sub-rows appended beneath the row (optional)
//   group(r) -> key, groupLabel(r) -> html — a centred full-width separator when the key changes (optional)

// Buff/debuff uptime, laid out like the damage-taken comparison (ours ← name → theirs)

// The damage-taken toggle lives on Execution (Output Quality) but also drives the per-boss damage

/* ---------- OPTIMIZE (per-raider rotation vs same-faction world best) ---------- */
const optMetricLbl=m=>m==="hps"?"HPS":"DPS";
// One boss's body for a spec: the world-best benchmark line (the top same-faction player ON THIS BOSS) +

function optBossBody(d,cls,s,b){

  const bm=b.benchmark;

  }

  const guild=bm.guild?` · ${esc(bm.guild)}`:"", reg=bm.region?` (${esc(bm.region)})`:"";

// The ranking ladder (slopegraph): your kill order left (first at top), benchmark right, mobs
// connected across; steep highlighted lines = mobs focused much earlier/later than the benchmark.
function killLadder(rows){
  rows=rowsOf(rows).filter(r=>r.both && r.ours!=null && r.theirs!=null);
  if(rows.length<2) return "";
  const ourOrder=[...rows].sort((a,b)=>(b.ours-a.ours)||a.mob.localeCompare(b.mob));
  const theirOrder=[...rows].sort((a,b)=>(b.theirs-a.theirs)||a.mob.localeCompare(b.mob));
  const orank={},trank={}; ourOrder.forEach((r,i)=>orank[r.mob]=i); theirOrder.forEach((r,i)=>trank[r.mob]=i);
  const n=rows.length, rowH=28, padT=34, padB=16, W=800, H=padT+n*rowH+padB;
  const llx=330, rlx=470, lL=338, lR=462, y=k=>padT+k*rowH+rowH/2;
  const big=r=>Math.abs(r.ours-r.theirs)>=34;
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block;font-family:inherit">`;
  s+=`<text x="${llx}" y="20" text-anchor="end" style="font-size:11px;font-weight:700;fill:var(--ours)">${esc(DATA.ours.title)} — kill first ↓</text>`;
  s+=`<text x="${rlx}" y="20" text-anchor="start" style="font-size:11px;font-weight:700;fill:var(--theirs)">${esc(DATA.theirs.title)} — kill first ↓</text>`;
  for(const r of rows){
    const ly=y(orank[r.mob]), ry=y(trank[r.mob]), b=big(r);
    s+=`<line x1="${lL}" y1="${ly}" x2="${lR}" y2="${ry}" style="stroke:${b?'var(--warn)':'var(--line)'};stroke-width:${b?2.5:1.3};stroke-opacity:${b?0.95:0.5}"/>`;
    s+=`<circle cx="${lL}" cy="${ly}" r="3" style="fill:var(--ours)"/><circle cx="${lR}" cy="${ry}" r="3" style="fill:var(--theirs)"/>`;
  }
  for(const r of ourOrder){const ly=y(orank[r.mob]),b=big(r);
    s+=`<text x="${llx-7}" y="${ly+4}" text-anchor="end" style="font-size:12px;fill:${b?'var(--warn)':'var(--txt)'};font-weight:${b?700:400}">${orank[r.mob]+1}. ${esc(r.mob)}</text>`;}
  for(const r of theirOrder){const ry=y(trank[r.mob]),b=big(r);
    s+=`<text x="${rlx+7}" y="${ry+4}" text-anchor="start" style="font-size:12px;fill:${b?'var(--warn)':'var(--txt)'};font-weight:${b?700:400}">${trank[r.mob]+1}. ${esc(r.mob)}</text>`;}
  return s+`</svg>`;
}
// One kill-order sequence as chips with arrows; a mob in a different slot than the other side is flagged.
function killSeq(seq,other){

  return seq.map((m,i)=>{

    prev=r.mob;
    h+=`<tr>${mobCell}<td>${esc(r.cc)}</td>
      <td class="num" style="color:var(--ours);font-weight:600">${r.ours}</td>
      <td class="num" style="color:var(--theirs);font-weight:600">${r.theirs}</td></tr>`;
  }
  return h+`</tbody></table>`;
}
// Trash sub-tabs: outer Kill Order | Crowd Control (data-ttab), and the nested Same-Pack | Pairwise
// inside Kill Order (data-ktab). Native toggle, no re-render. Both groups wired the same way.
function mountTrash(){
  const el=document.getElementById("p-trash"); if(!el) return;
  const wire=attr=>el.querySelectorAll(`.btab[data-${attr}]`).forEach(t=>t.addEventListener("click",()=>{
    const k=t.dataset[attr];
    el.querySelectorAll(`.btab[data-${attr}]`).forEach(x=>x.classList.toggle("on",x.dataset[attr]===k));
    el.querySelectorAll(`.bsub[data-${attr}]`).forEach(x=>x.classList.toggle("active",x.dataset[attr]===k));
  }));
  wire("ttab"); wire("ktab");
}
/* ---------- WIPES (per-boss progression: the wall, the trend, the tax, what ends attempts) ---------- */
function renderWipes(d){
  const dp=d.deep, w=dp&&dp.wipes&&dp.wipes.ours;
  if(!w||!w.present||!rowsOf(w.bosses).length){
    return `<h2 class="section">Wipes</h2><p class="num" style="padding:8px 2px">No wipes recorded on the shared bosses — a clean clear. (This tab fills in on progression nights: it reads every pull's depth, phase, the time the wiping cost, and what ended each attempt.)</p>`;
  }
  const tW=(dp.wipes.theirs&&dp.wipes.theirs.present)?dp.wipes.theirs:null;
  const tByEnc={}; if(tW) for(const b of rowsOf(tW.bosses)) tByEnc[b.encounterID]=b;
  const mmss=s=>{s=Math.round(s);return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");};
  const pct=p=>p==null?"—":(p<1?"<1%":(Math.round(p*10)/10)+"%");
  let h=`<h2 class="section">Wipes — Progression Breakdown<span class="xp">Experimental</span><span class="hint">A deep read of every wipe on the shared bosses: how far attempts got (the <b>wall</b>), whether they're <b>converging</b> on a kill, the <b>time</b> wiping cost, and <b>what ends attempts</b> (first death and killing blows). First-party — the benchmark is on farm, so this is about <i>your</i> progression. <b>Experimental.</b></span></h2>`;
  h+=`<div class="cards">
    <div class="card"><div class="label">Wipes (shared bosses)</div><div class="vals"><span class="v ours">${w.totalWipes}</span>${tW?`<span class="v theirs">${tW.totalWipes}</span>`:""}</div></div>
    <div class="card"><div class="label">Time Spent Wiping</div><div class="vals"><span class="v ours">${mmss(w.totalWipeTimeSec)}</span>${tW?`<span class="v theirs">${mmss(tW.totalWipeTimeSec)}</span>`:""}</div></div>
    ${w.biggestSink?`<div class="card"><div class="label">Biggest Time Sink</div><div class="vals"><span class="v ours" style="font-size:17px">${esc(w.biggestSink)}</span></div></div>`:""}
  </div>`;
  for(const b of rowsOf(w.bosses)){
    const tb=tByEnc[b.encounterID];
    h+=`<div class="boss" style="margin-top:18px"><h3>${esc(b.name)}<span class="badge" style="background:${b.downed?'#16351f':'#3a1717'};color:${b.downed?'var(--good)':'var(--bad)'}">${b.downed?'downed ✓':'not downed'}</span></h3>
      <div class="cards">
        <div class="card"><div class="label">Wipes</div><div class="vals"><span class="v ours">${b.wipes}</span>${tb?`<span class="v theirs">${tb.wipes}</span>`:""}</div></div>
        <div class="card"><div class="label">Closest Attempt</div><div class="vals"><span class="v ours">${pct(b.bestPct)}${b.bestPhase?` <span class="num" style="font-size:12px">(${esc(b.bestPhase)})</span>`:""}</span></div></div>
        <div class="card"><div class="label">Time Wiping</div><div class="vals"><span class="v ours">${mmss(b.wipeTimeSec)}</span></div></div>
      </div>`;
    if(b.wall&&b.wall.phase){
      h+=`<p class="srcs" style="margin:10px 0 4px"><b>The wall:</b> ${b.wall.wipes} of ${b.wall.ofTotal} wipe${b.wall.ofTotal!==1?"s":""} ended in <b style="color:var(--ours)">${esc(b.wall.phase)}</b>${b.wall.medPct!=null?` around <b>${pct(b.wall.medPct)}</b> boss HP`:""} — the phase to drill.</p>`;
    }
    if(b.trend){
      const seq=asArr(b.trendSeq).filter(v=>v!=null);
      const viz=seq.length?`<div style="display:flex;align-items:flex-end;gap:3px;height:48px;margin:6px 0 2px">`+seq.map((v,i)=>{const prog=Math.max(0,100-v);return `<span title="Wipe ${i+1}: ${pct(v)} boss HP remaining" style="width:10px;display:inline-block;border-radius:2px 2px 0 0;background:var(--ours);height:${Math.max(4,Math.round(prog/100*44))}px"></span>`;}).join("")+`</div><div class="num" style="font-size:11px;opacity:.6">each bar = a wipe in order · taller = closer to the kill</div>`:"";
      h+=`<p class="srcs" style="margin:8px 0 2px"><b>Trend:</b> ${esc(b.trend)}</p>${viz}`;
    }
    if(b.deathsTracked&&rowsOf(b.firstDeaths).length){
      const top=rowsOf(b.firstDeaths)[0];
      h+=`<p class="srcs" style="margin:12px 0 4px"><b>What ends your attempts:</b> the first death was most often <b style="color:var(--bad)">${esc(top.cause)}</b>${top.count>1?` (${top.count}× across ${b.deathsTracked} tracked wipes)`:""} — the failure that starts the cascade.</p>`;
      // Disambiguation: is this a mechanics/positioning wall, or a sustained-damage (healing/gear) wall?
      const m=b.causeMechanic||0, s=b.causeSustained||0, tot=m+s;
      if(tot){
        const mechs=rowsOf(b.topMechanics).slice(0,3).map(x=>esc(x.cause)).join(", ");
        let verdict;
        if(m>=2*s&&m>0) verdict=`a <b style="color:var(--bad)">mechanics problem</b> — ${m}/${tot} deaths to avoidable hits (${mechs}). Drill positioning/timing on those; <b>healing won't fix it</b> (you can't out-heal those hits).`;
        else if(s>=2*m&&s>0) verdict=`a <b style="color:var(--bad)">sustained-damage problem</b> — ${s}/${tot} deaths to melee/attrition, not single mechanics. That's a <b>healing-assignment / defensive / gear / tuning</b> question, not a positioning drill.`;
        else verdict=`<b>mixed</b> — ${m}/${tot} to avoidable mechanics (${mechs}), ${s}/${tot} to sustained damage. Split the fix: positioning for the first, healing/CDs for the second.`;
        h+=`<p class="srcs" style="margin:4px 0 4px"><b>Likely cause:</b> ${verdict} <span class="num" style="opacity:.6">— heuristic from the death-window damage mix; it can't see a missed defensive, and "avoidable" = a death window dominated by named, non-melee damage.</span></p>`;
      }
      const kb=rowsOf(b.killingBlows);
      if(kb.length){
        h+=`<table><thead><tr><th>Killing blow on wipes</th><th>Deaths</th></tr></thead><tbody>`;
        for(const r of kb) h+=`<tr><td style="font-weight:600">${esc(r.cause)}</td><td class="num">${r.count}</td></tr>`;
        h+=`</tbody></table>`;
      }
    } else if(!w.hasDeaths){
      h+=`<p class="srcs" style="margin:8px 0 0;opacity:.7">Per-wipe death detail (what ends the attempts) appears after the next data refresh — it draws on a newly added fetch.</p>`;
    }
    h+=`</div>`;
  }
  /* Wipe Recovery (EXPERIMENTAL) — reset/rebuff/re-pull pace between a wipe and the next pull. Moved here
     from Execution in the /audit pass: it's wipe-pacing, so it belongs on the Wipes tab. */
  h+=wipeRecoveryView(d);
  return h;
}
function render(){
  const d=DATA; if(!d){document.getElementById("app").innerHTML="<p>No data.</p>";return;}
  let h=`<header class="hero">
    <div class="kicker">${esc(d.zone||"Raid")} · Performance Comparison</div>
    <h1>Raid Benchmark Report</h1>
    <div class="matchup"><span class="team ours">${esc(d.ours.title)}</span><span class="vs">vs</span><span class="team theirs">${benchName(d.theirs.title)}</span></div>
    <div class="sub"><span class="dot ours"></span>${esc(d.ours.title)} &nbsp; <span class="dot theirs"></span>${benchName(d.theirs.title)} &nbsp;·&nbsp; ${d.summary.bossCount} shared bosses</div>
  </header>
  <div class="tabs"><div class="tab active" data-t="overview">Overview</div><div class="tab" data-t="composition">Composition</div><div class="tab" data-t="enchants">Prep</div><div class="tab" data-t="execution">Execution</div><div class="tab" data-t="bosses">Bosses</div><div class="tab" data-t="wipes">Wipes</div><div class="tab" data-t="optimize">Optimize</div><div class="tab" data-t="trash">Trash</div></div>
  <div class="panel active" id="p-overview">${renderOverview(d)}</div>
  <div class="panel" id="p-composition">${renderComposition(d)}</div>
  <div class="panel" id="p-enchants">${renderEnchants(d)}</div>
  <div class="panel" id="p-execution"></div>
  <div class="panel" id="p-bosses"></div>
  <div class="panel" id="p-wipes">${renderWipes(d)}</div>
  <div class="panel" id="p-optimize">${renderOptimize(d)}</div>
  <div class="panel" id="p-trash">${renderTrash(d)}</div>
  <footer>Generated by warcraft-logs-analyzer · data via Warcraft Logs v2 API · parse colors are role-appropriate percentiles</footer>`;
  document.getElementById("app").innerHTML=h;
  mountExecution();
  mountBosses();
  mountOptimize();
  mountTrash();
  wrapTables(); // wrap tables in the statically-rendered panels (Overview, Composition, Prep, Trash)
  document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    document.getElementById("p-"+t.dataset.t).classList.add("active");
  }));
}
render();
</script>
