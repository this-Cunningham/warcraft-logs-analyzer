<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raid Comparison Report</title>
<style>
  :root{
    --bg:#0b0e14; --panel:#141925; --panel2:#1b2230; --line:#262f40;
    --txt:#e6ebf2; --muted:#8a96aa; --ours:#4ea1ff; --theirs:#e268a8;
    --good:#36d399; --bad:#f87272; --warn:#fbbd23;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 70% -10%,#16203a 0%,var(--bg) 55%);
    color:var(--txt);font:15px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;padding:32px 20px 80px}
  .wrap{max-width:1080px;margin:0 auto;overflow-x:clip}
  header.hero{margin-bottom:20px}
  .kicker{letter-spacing:.18em;text-transform:uppercase;font-size:12px;color:var(--muted)}
  h1{font-size:30px;margin:6px 0 4px;font-weight:700}
  .matchup{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:10px}
  .team{font-weight:600;font-size:18px;padding:6px 14px;border-radius:10px;background:var(--panel);border:1px solid var(--line)}
  .team.ours{box-shadow:inset 0 0 0 1px rgba(78,161,255,.35)}
  .team.theirs{box-shadow:inset 0 0 0 1px rgba(255,122,89,.35)}
  .vs{color:var(--muted);font-weight:700}
  .sub{color:var(--muted);font-size:13px;margin-top:6px}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px;vertical-align:middle}
  .dot.ours{background:var(--ours)} .dot.theirs{background:var(--theirs)}

  .tabs{display:flex;gap:8px;margin:22px 0 26px;border-bottom:1px solid var(--line)}
  .tab{padding:11px 20px;cursor:pointer;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;
    margin-bottom:-1px;user-select:none}
  .tab:hover{color:var(--txt)}
  .tab.active{color:var(--txt);border-bottom-color:var(--ours)}
  .panel{display:none} .panel.active{display:block}

  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:0 0 30px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}
  .card .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em}
  .card .vals{display:flex;align-items:baseline;gap:10px;margin-top:8px;flex-wrap:wrap}
  .card .v{font-size:22px;font-weight:700}
  .card .v.ours{color:var(--ours)} .card .v.theirs{color:var(--theirs)}
  .card .vcol{display:flex;flex-direction:column;align-items:flex-start}
  .card .vlab{font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-top:1px;opacity:.85;max-width:92px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card .vlab.ours{color:var(--ours)} .card .vlab.theirs{color:var(--theirs)}
  .card .delta{margin-left:auto;font-size:13px;font-weight:600}
  .delta.good{color:var(--good)} .delta.bad{color:var(--bad)} .delta.flat{color:var(--muted)} .delta.warn{color:var(--warn)}
  .ghostbar{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin:4px 0 2px}
  .ghostbtn{cursor:pointer;font:inherit;font-size:12px;font-weight:600;color:var(--good);background:transparent;border:1px solid var(--good);border-radius:7px;padding:4px 10px}
  .ghostbtn.on{background:var(--good);color:#0b0e14}
  .ghosttoggles{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 2px}
  .ghostd{cursor:pointer;font:inherit;font-size:11px;background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:3px 8px;color:var(--txt);opacity:.5}
  .ghostd.on{opacity:1;border-color:var(--good)} .ghostd .gck{color:var(--good);font-weight:700;margin-right:2px}

  h2.section{font-size:14px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);
    margin:34px 0 14px;border-top:1px solid var(--line);padding-top:22px}
  /* First section in a panel sits right under the tab bar — drop the divider/top gap. */
  .panel > h2.section:first-child{border-top:none;padding-top:0;margin-top:8px}
  /* `.hint` is the standard "additional context" copy under a section title. It also appears inside an
     <h4> (e.g. the Interrupts sub-section headers), where the `.section` ancestor selector wouldn't
     reach it — so `h4 .hint` is included to give that copy the identical muted styling everywhere. */
  .section .hint, h4 .hint{text-transform:none;letter-spacing:0;font-weight:400;display:block;color:var(--muted);font-size:12.5px;margin-top:4px}

  .boss{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:18px}
  .boss h3{margin:0 0 14px;font-size:19px;display:flex;align-items:center;gap:10px}
  .boss h3 .badge{margin-left:auto;font-size:12px;font-weight:600;color:var(--muted)}
  .metric{margin:12px 0}
  .metric .mlabel{font-size:12px;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:5px}
  .bar{position:relative;height:22px;border-radius:7px;background:var(--panel2);overflow:hidden}
  .bar .fill{position:absolute;top:0;bottom:0;left:0;border-radius:7px}
  .bar .fill.ours{background:linear-gradient(90deg,#2b6fc2,var(--ours))}
  .bar .fill.theirs{background:linear-gradient(90deg,#8e3d6e,var(--theirs))}
  .bar .tag{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:12px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.6)}
  .barrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  table{width:100%;border-collapse:collapse;margin-top:14px;font-size:13.5px}
  th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding:6px 8px;border-bottom:1px solid var(--line)}
  td{padding:7px 8px;border-bottom:1px solid rgba(38,47,64,.5)}
  tr:last-child td{border-bottom:none}
  .pname{font-weight:600}
  .role{color:var(--muted);font-size:11px;text-transform:uppercase}
  .parse{display:inline-block;min-width:34px;text-align:center;padding:2px 7px;border-radius:6px;font-weight:700;font-size:12px;color:#0b0e14}
  .num{font-variant-numeric:tabular-nums;color:var(--muted)}

  .complist{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .chip{padding:4px 10px;border-radius:8px;background:var(--panel2);font-size:13px;font-weight:600;border:1px solid var(--line)}
  .gaprow td:first-child{font-weight:600}
  .yes{color:var(--good);font-weight:700}.no{color:var(--bad);font-weight:700}
  tr.isgap{background:rgba(248,114,114,.07)}
  /* Grouped interrupts table: each interrupted spell is a header row, kicking specs nested under it. */
  table.igrp tr.igrphd td{background:var(--panel2);font-weight:700;font-size:13px;border-top:2px solid var(--line);border-bottom:1px solid var(--line);padding-top:9px}
  .tag2{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}
  .tag2.gap{background:rgba(248,114,114,.18);color:#ffb4b4}
  .tag2.edge{background:rgba(78,161,255,.18);color:#bcdcff}
  .tag2.ok{background:rgba(54,211,153,.15);color:#9af0cf}
  /* "Experimental" chip — marks a newer, less-proven insight (e.g. hit-cap audit, per-spec activity).
     Violet so it reads as beta/provisional without looking like a gap (red) or a win (green). Inline in
     an h2.section title; not a `.hint`, so the section-title styling leaves it as a pill. */
  .xp{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.08em;padding:2px 8px;border-radius:6px;
    background:rgba(148,130,201,.18);color:#ccbff2;border:1px solid rgba(148,130,201,.4);vertical-align:middle;margin-left:8px}

  /* Positioning views (server-rendered SVG fragments + their captions/verdicts). */
  .poshd{font-size:12.5px;font-weight:700;margin:0 0 3px}
  .posnote{font-size:12.5px;line-height:1.5;color:var(--text);background:var(--panel2);border-left:3px solid var(--accent,#7c83ff);
    padding:7px 11px;border-radius:0 6px 6px 0;margin:9px 0 2px}
  .poscl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-left:7px}
  .poshl{background:linear-gradient(90deg,rgba(124,131,255,.16),rgba(124,131,255,.04));border:1px solid rgba(124,131,255,.32);
    border-radius:9px;padding:11px 15px;margin:14px 0}
  .poshl-k{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#aab2ff;margin-bottom:3px}
  .poshl-v{font-size:14px;line-height:1.5;color:var(--text)}
  .upt{position:relative;height:16px;border-radius:5px;background:var(--panel2);overflow:hidden;min-width:90px}
  .upt .f{position:absolute;top:0;bottom:0;left:0}
  .upt .f.ours{background:var(--ours)}.upt .f.theirs{background:var(--theirs)}
  .uptwrap{display:flex;align-items:center;gap:8px}.uptwrap .pct{font-variant-numeric:tabular-nums;font-size:12.5px;min-width:34px}
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:22px}
  .warnpill{color:var(--warn);font-weight:700}
  /* Boss-panel summary strip — four stats spread evenly across the full panel width (not bunched left). */
  .strip{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:2px 0 12px;padding:11px 16px;background:var(--panel2);border-radius:10px}
  @media(max-width:560px){.strip{grid-template-columns:repeat(2,1fr)}}
  .stat .sl{color:var(--muted);display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
  .stat .sv{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums}
  .cours{color:var(--ours)}.cthe{color:var(--theirs)}
  .srcs{font-size:12.5px;color:var(--muted);margin:0 0 10px}.srcs .num{color:var(--txt);font-weight:600}
  .segwrap{display:flex;align-items:center;gap:10px;margin:0 0 16px}
  .segwrap .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg .dmgbtn{background:var(--panel);color:var(--muted);border:none;padding:6px 15px;font:inherit;font-size:12.5px;font-weight:600;cursor:pointer}
  .seg .dmgbtn:hover{color:var(--txt)}
  .seg .dmgbtn.on{background:var(--ours);color:#06101f}
  .btabs{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 14px}
  .btab{padding:6px 14px;border-radius:8px;background:var(--panel2);color:var(--muted);border:1px solid var(--line);font:inherit;font-size:12px;font-weight:600;cursor:pointer}
  .btab:hover{color:var(--txt)}
  .btab.on{background:var(--ours);color:#06101f;border-color:transparent}
  /* Per-spec Timeline tabs: class colour rides on --tlc (set inline). Inactive = coloured text;
     active = filled with the class colour. Raid / Melee / Ranged tabs set no --tlc → default accent. */
  .tltabs{margin-top:10px}
  .tltab{color:var(--tlc,var(--muted))}
  .tltab.on{color:#06101f;background:var(--tlc,var(--ours))}
  .bsub{display:none}.bsub.active{display:block}
  /* Optimize tab — three nested tab levels (class -> spec -> boss), then per-player rotation tables. */
  .osub{display:none}.osub.active{display:block}
  .ossub{display:none}.ossub.active{display:block}
  .obsub{display:none}.obsub.active{display:block}
  .btabs.ospecs{margin:2px 0 14px}
  .btabs.ospecs .btab.on{background:var(--theirs);color:#06101f}
  .btabs.obosses{margin:2px 0 12px}
  .optbench{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 12px;margin:0 0 14px;font-size:13px;color:var(--muted)}
  .optbench b{color:var(--txt)}
  .optlabel{font-size:11px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;color:var(--muted);margin-right:4px}
  .optpname{display:flex;align-items:center;gap:8px;margin:0 0 6px;font-size:15px;font-weight:600}
  .ccard{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:8px 12px;min-width:98px}
  .ccard .chead{font-weight:700;font-size:13px;margin-bottom:5px}
  .cspecs{display:flex;flex-direction:column;gap:2px}
  .specline{font-size:11.5px;color:var(--muted)}
  /* A spec only one side fields, highlighted in its own roster tile. */
  .specline.gap{color:#ffb4b4;font-weight:600} .specline.edge{color:#bcdcff;font-weight:600}
  .covlegend{display:flex;flex-wrap:wrap;gap:16px;margin:0 0 10px;font-size:12px}
  .covkey{display:inline-flex;align-items:center;gap:7px;color:var(--muted);font-weight:600}
  .covkey::before{content:"";width:10px;height:10px;border-radius:3px;display:inline-block}
  .covkey.gap::before{background:var(--bad)} .covkey.edge::before{background:var(--ours)}
  .cgap{color:#ffb4b4} .cedge{color:#bcdcff}
  td.prov{font-weight:600;white-space:nowrap}
  .dmgcmp{margin:4px 0 12px}
  .dmgcmphdr2{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:10px;font-weight:700;gap:8px}
  .dgrid{display:grid;grid-template-columns:62px 1fr 175px 1fr 62px;align-items:center;row-gap:7px;column-gap:8px}
  /* Mirrored-bar grid: value ← bar — NAME(+Δ) — bar → value. The delta lives in the centre cell,
     directly under the name (the anchor), so the gap reads at the same moment as what it's for —
     no tracking to a far-right column. Five columns, no trailing delta column. */
  .ugrid{display:grid;grid-template-columns:46px 1fr 150px 1fr 46px;align-items:center;row-gap:7px;column-gap:8px}
  .ugrid .dmid .delta{display:block;font-size:11px;font-weight:600;margin-top:1px;line-height:1.15}
  .dgrid .dval,.ugrid .dval{font-variant-numeric:tabular-nums;font-size:11.5px;color:var(--muted)}
  .dgrid .dval.lo,.ugrid .dval.lo{text-align:center}.dgrid .dval.ro,.ugrid .dval.ro{text-align:center}
  .dgrid .dmid,.ugrid .dmid{text-align:center;font-weight:600;font-size:12px;color:var(--txt);line-height:1.2}
  /* Mirrored-bar grid WITH a right-hand context column (combine: class="ugrid ugridc"). Same five
     mirror columns, plus a 6th self-describing column held all the way on the right (buff Type,
     earliest pull, add count) — additive context, never part of the comparison. */
  .ugridc{grid-template-columns:46px 1fr 150px 1fr 46px minmax(58px,auto)}
  .ugridc .dctx{font-size:11px;color:var(--muted);text-align:right;line-height:1.2;font-variant-numeric:tabular-nums}
  /* Mirrored-bar grid v2 (mirrorGrid()): NO side value columns — bar← | NAME · Δ(with units) | →bar |
     (optional ctx). The raw ours/theirs values are dropped; the centre cell carries the signed difference
     WITH units, so the gap reads at a glance and the bars get the freed width. */
  .mg{display:grid;grid-template-columns:1fr minmax(140px,220px) 1fr;align-items:center;row-gap:7px;column-gap:10px}
  .mgc{grid-template-columns:1fr minmax(140px,220px) 1fr minmax(58px,auto)}
  .mg .dmid{text-align:center;font-weight:600;font-size:12px;color:var(--txt);line-height:1.2}
  .mg .dmid .delta{display:block;font-size:11px;font-weight:600;margin-top:1px;line-height:1.15}
  .mg .dctx{font-size:11px;color:var(--muted);text-align:right;line-height:1.2;font-variant-numeric:tabular-nums}
  .mg .mgsub{grid-column:1/-1;margin:-2px 0 4px;padding-left:18px}
  .mg .mgsub .mg{row-gap:4px;column-gap:8px}
  .mg .mgsub .dbarL,.mg .mgsub .dbarR{height:10px}
  .mg .mgsub .dmid{font-size:11px;font-weight:500;color:var(--muted)}
  /* Centred class/group separator above a group of mirror rows. */
  .mg .mggroup{grid-column:1/-1;text-align:center;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:9px 0 1px;border-top:1px solid var(--line);padding-top:6px}
  @media(max-width:820px){.mg{grid-template-columns:1fr 92px 1fr;column-gap:6px}.mgc{grid-template-columns:1fr 92px 1fr minmax(48px,auto);column-gap:6px}}
  .dbarL,.dbarR{position:relative;height:14px;background:var(--panel2);border-radius:5px;overflow:hidden}
  .dbarL .f,.dbarR .f{position:absolute;top:0;bottom:0}
  .dbarL .f.ours{right:0;background:var(--ours);border-radius:5px 0 0 5px}
  .dbarR .f.theirs{left:0;background:var(--theirs);border-radius:0 5px 5px 0}
  /* Per-player consumables matrix (bosses across the top, F/B/G/Fd/P sub-columns). */
  /* Every wide data table (.tscroll, applied at render) and the consumables matrix (.cmwrap) scroll
     inside their own box, so a table wider than the screen scrolls sideways internally instead of
     widening the whole page (which on mobile leaks into a sideways scroll of the entire page).
     The scrollbar itself is the overflow affordance — no edge fade/shadow, which obscured the data
     sitting at the edges of the viewport. */
  .cmwrap,.tscroll{overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:100%}
  .cmwrap{margin-top:12px}
  /* .tscroll carries the table's top margin so the table itself sits flush inside the scroll box. */
  .tscroll{margin-top:14px}
  .tscroll>table{margin-top:0}
  table.cmatrix{width:auto;min-width:100%;border-collapse:collapse;font-size:12px}
  table.cmatrix th,table.cmatrix td{padding:4px 0;text-align:center;border-bottom:1px solid rgba(38,47,64,.5)}
  table.cmatrix th.cbgrp{font-size:11px;color:var(--txt);text-transform:none;letter-spacing:0;font-weight:700;
    padding:6px 0;border-bottom:1px solid var(--line)}
  /* Boss-name header sits in a FIXED-width box (≈ a 4-sub-col group, sized to fit "Void Reaver") and
     truncates with "…" — so every boss column is identical width regardless of name length. A short name
     ("Al'ar") no longer squeezes its sub-cols, and a long one ("High Astromancer Solarian") no longer
     stretches them; the full name stays in the th's title for hover/tap. */
  table.cmatrix .cbname{display:block;width:96px;margin:0 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  table.cmatrix th.csub2{font-size:10px;color:var(--warn);font-weight:700;width:24px;padding:3px 0;text-transform:none;letter-spacing:0}
  /* Legend key tying the yellow F/B/G/Fd/P column letters to their meaning. */
  .clegend{display:flex;flex-wrap:wrap;gap:14px;margin:6px 0 0;font-size:12px;color:var(--muted)}
  .clegend .ckey b{color:var(--warn);font-weight:700;margin-right:4px}
  table.cmatrix td.cc{width:24px;font-variant-numeric:tabular-nums}
  table.cmatrix .cbsep{border-left:1px solid var(--line)}
  table.cmatrix .cmname{text-align:left;white-space:nowrap;padding:4px 12px 4px 4px;position:sticky;left:0;background:var(--panel)}
  table.cmatrix th.cmname{background:transparent}
  table.cmatrix .csum{text-align:center;padding:0 10px;white-space:nowrap}
  table.cmatrix td.cmiss{background:rgba(248,114,114,.13)}
  .cyes{color:var(--good);font-weight:700}.cno{color:var(--bad);font-weight:700}.cna{color:var(--muted);opacity:.45}
  /* "Biggest Gaps" scorecard at the top of Overview. */
  .gaps{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:0 0 6px}
  .gapcard{background:var(--panel);border:1px solid var(--line);border-left-width:4px;border-radius:12px;padding:13px 16px}
  .gapcard.high{border-left-color:var(--bad)} .gapcard.med{border-left-color:var(--warn)} .gapcard.low{border-left-color:var(--muted)}
  .gapcard .gt{font-weight:700;font-size:14px;margin-bottom:5px;display:flex;align-items:center;gap:8px}
  .gapcard .gt .sev{margin-left:auto;font-size:10px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;padding:2px 7px;border-radius:6px}
  .gapcard.high .gt .sev{background:rgba(248,114,114,.18);color:#ffb4b4}
  .gapcard.med .gt .sev{background:rgba(251,189,35,.16);color:#ffe08a}
  .gapcard.low .gt .sev{background:rgba(138,150,170,.16);color:#c2cbdb}
  .gapcard .gd{color:var(--muted);font-size:12.5px;line-height:1.45}
  /* "What You're Doing Well" — the positive mirror of the gaps, green-keyed and visually secondary. */
  .gapcard.win{border-left-color:var(--good)}
  .gapcard.win .gt .sev{background:rgba(74,222,128,.15);color:#9be7b4}
  /* Trash — same-pack kill-order comparison (your sequence vs benchmark, mobs first→last). */
  .tko{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:9px 12px;margin:2px 0 12px}
  .tkpack{font-size:12.5px;font-weight:600;margin-bottom:7px;padding-bottom:6px;border-bottom:1px solid var(--line)}
  .tkrow{font-size:13px;line-height:2;display:flex;gap:8px;align-items:flex-start}
  .tkrow + .tkrow{margin-top:2px}
  .tklbl{flex:0 0 76px;font-size:10px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;padding-top:3px}
  .tkseq{flex:1}
  .tkmob{display:inline-block;padding:2px 8px;border-radius:6px;background:var(--panel);border:1px solid var(--line);margin:2px 0}
  .tkmob.div{border-color:var(--warn);color:#ffe08a;font-weight:600}
  .tkarrow{color:var(--muted);margin:0 3px}
  .ladder{border:1px solid var(--line);border-radius:12px;padding:12px 8px;margin:2px 0 14px;overflow-x:auto;background:var(--panel)}
  footer{color:var(--muted);font-size:12px;text-align:center;margin-top:40px}
  @media(max-width:820px){.cards{grid-template-columns:repeat(2,1fr)}.barrow,.twocol,.gaps{grid-template-columns:1fr}.dgrid{grid-template-columns:46px 1fr 100px 1fr 46px;column-gap:5px}.ugrid{grid-template-columns:38px 1fr 90px 1fr 38px;column-gap:5px}.ugridc{grid-template-columns:38px 1fr 90px 1fr 38px minmax(48px,auto);column-gap:5px}}
  /* Phone layout: tighten outer padding and let the primary tab bar scroll sideways instead of
     overflowing off-screen (so the last tabs — Bosses/Trash — stay reachable). */
  /* Benchmark guild name: show full on desktop, the 10-char truncation on mobile (a long benchmark name —
     e.g. a joke guild tag — otherwise blows out the hero on a phone). Toggled by the media query below. */
  .bench .bmob{display:none}
  @media(max-width:640px){
    body{padding:24px 14px 64px}
    h1{font-size:24px}
    .matchup{gap:8px}
    .team{font-size:16px;padding:6px 12px}
    .bench .bfull{display:none}
    .bench .bmob{display:inline}
    .tabs{flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;gap:2px;margin:18px 0 22px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    .tab{flex:0 0 auto;padding:10px 14px;white-space:nowrap}
  }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
const DATA = /*__DATA__*/null;

const CLASS_COLORS = {Warrior:"#C79C6E",Paladin:"#F58CBA",Hunter:"#ABD473",Rogue:"#FFF569",Priest:"#FFFFFF",
  Shaman:"#0070DE",Mage:"#69CCF0",Warlock:"#9482C9",Druid:"#FF7D0A","Death Knight":"#C41F3B"};
const cc = k => CLASS_COLORS[k]||"#cbd3df";
const asArr = x => Array.isArray(x)?x:(x==null?[]:[x]);
// PowerShell's ConvertTo-Json turns an empty array into {} and a single-element array into a
// bare object. asArr handles the single case; rowsOf also drops the empty-{} ghost so a list
// with no real rows renders as empty (no "undefined / undefined / NaN" row).
const rowsOf = x => asArr(x).filter(r => r && typeof r === "object" && Object.keys(r).length > 0);
// WCL death icons look like "Hunter-BeastMastery" -> spec "Beast Mastery".
const specFromIcon = (icon)=>{ if(!icon) return ""; const p=String(icon).split("-"); return p.length<2?"":p[1].replace(/([a-z])([A-Z])/g,"$1 $2"); };
function parseColor(p){if(p>=100)return"#e5cc80";if(p>=99)return"#e268a8";if(p>=95)return"#ff8000";
  if(p>=75)return"#a335ee";if(p>=50)return"#0070ff";if(p>=25)return"#1eff00";return"#9aa4b2";}
const fmtTime=ms=>{const s=Math.round(ms/1000);return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");};
const fmtMin=ms=>{const m=Math.round(ms/60000);return m+" min";};
const fmtM=n=>n>=1e6?(n/1e6).toFixed(1)+"M":(n>=1e3?(n/1e3).toFixed(0)+"k":""+n);
// Rate (DPS/HPS): one decimal of k/M so 25564 reads "25.6k", not "26k".
const fmtR=n=>n>=1e6?(n/1e6).toFixed(2)+"M":(n>=1e3?(n/1e3).toFixed(1)+"k":""+Math.round(n));
// Signed delta for big rate numbers (used by Raid DPS/HPS cards). Higher is better.
const deltaRate=(o,t)=>{const df=o-t;return{cls:df===0?"flat":(df>0?"good":"bad"),txt:df===0?"even":((df>0?"+":"−")+fmtR(Math.abs(df)))};};
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
// Benchmark guild name with a desktop-full / mobile-10-char swap (CSS `.bench` toggles which span shows).
// On mobile, names over 10 chars are cut to 10 + ellipsis so a long benchmark tag doesn't overflow the hero.
const benchName=s=>{const f=String(s||"");const short=f.length>10?f.slice(0,10)+"…":f;
  return `<span class="bench"><span class="bfull">${esc(f)}</span><span class="bmob">${esc(short)}</span></span>`;};
const deltaLow =(o,t)=>{if(o===t)return{cls:"flat",txt:"even"};const b=o<t;return{cls:b?"good":"bad",txt:(b?"−":"+")+(Math.round(Math.abs(o-t)*10)/10)};};
const deltaHigh=(o,t)=>{const d=Math.round((o-t)*10)/10;if(d===0)return{cls:"flat",txt:"even"};return{cls:d>0?"good":"bad",txt:(d>0?"+":"")+d};};
// Unit-aware signed-difference delta for the mirror-bar centre cell (now that the raw side values are gone):
// formats |ours−theirs| with `fmt`, signs it, and adds `unit`. lower=true when a smaller value is better.
const dDelta=(o,t,fmt,unit,lower)=>{if(o==null||t==null)return{cls:"flat",txt:""};
  const diff=o-t; if(Math.round(diff*100)/100===0)return{cls:"flat",txt:"even"};
  const better=lower?diff<0:diff>0; return{cls:better?"good":"bad",txt:(diff>0?"+":"−")+fmt(Math.abs(diff))+(unit||"")};};
let dmgMode="persec"; // "persec" | "total" — toggled in the Output Quality section, drives all damage-taken displays
const bossTab={};      // per-boss sub-tab state, keyed by encounterID -> "buffs" | "dmg" (survives re-render)
let bossSel=null;      // Bosses-tab selected boss (encounterID as string); null -> first boss
const tlTab={};        // per-boss Timeline inner-tab state, keyed by encounterID -> "raid" | "s<i>"

function consumeMatrix(ppc){
  const bosses=rowsOf(ppc.bosses), players=rowsOf(ppc.players);
  if(!bosses.length||!players.length) return '<p class="num" style="padding:8px 2px">No per-player consumable data.</p>';
  const SUB=[["F","Flask"],["B","Battle Elixir"],["G","Guardian Elixir"],["Fd","Food"]];
  const yes='<span class="cyes">✓</span>', no='<span class="cno">✗</span>', na='<span class="cna">·</span>';
  // Two-level header: boss names spanning the sub-columns, then F/B/G/Fd under each.
  let h1=`<tr><th class="cmname" rowspan="2">Player</th><th class="csum" rowspan="2" title="Bosses where prepared (flask or battle+guardian) / bosses played">Prep</th>`;
  let h2=`<tr>`;
  for(const b of bosses){
    h1+=`<th class="cbgrp" colspan="${SUB.length}" title="${esc(b.name)}"><span class="cbname">${esc(b.name)}</span></th>`;
    h2+=SUB.map(([s,full],i)=>`<th class="csub2${i===0?' cbsep':''}" title="${full}">${s}</th>`).join("");
  }
  h1+=`</tr>`; h2+=`</tr>`;
  // Glyph per cell state: good=had it (green ✓), miss=missing & needed (red ✗ + red tint),
  // na=not needed via this route (faint ✗, e.g. no flask because elixirs cover it). `na` (the dot)
  // is reserved for bosses the player didn't attend.
  const naX='<span class="cna">✗</span>';
  const gly=s=>s==="good"?yes:(s==="miss"?no:naX);
  let body="";
  for(const p of players){
    const ratio=p.presentCount?p.consumedCount/p.presentCount:1;
    const sumCls=ratio>=0.999?"good":(ratio>=0.5?"warn":"bad");
    let row=`<tr><td class="cmname pname" style="color:${cc(p.class)}">${esc(p.name)} <span class="role">${esc(p.spec||p.role)}</span></td>`+
      `<td class="csum"><span class="delta ${sumCls}">${p.consumedCount}/${p.presentCount}</span></td>`;
    for(const b of bosses){
      const c=p.cells?p.cells[String(b.encounterID)]:null;
      if(!c||!c.present){ row+=SUB.map((_,i)=>`<td class="cc${i===0?' cbsep':''}">${na}</td>`).join(""); continue; }
      // Decide flask/battle/guardian states by which route prepped them (don't flag the unused one).
      const isDps=p.role==="dps";
      let fS,bS,gS;
      if(c.flask){ fS="good"; bS="na"; gS="na"; }                 // flask covers it — elixirs not needed
      else if(c.battle&&c.guardian){ fS="na"; bS="good"; gS="good"; } // full elixir pair
      else { fS=(!c.battle&&!c.guardian)?"miss":"na";              // nothing at all → flask is a miss too
             bS=c.battle?"good":"miss";
             // For a DPS only the BATTLE elixir is throughput — a missing guardian is a defensive/utility
             // choice, not a prep failure, so render it faint (na) not red. Healers/tanks still need both.
             gS=c.guardian?"good":((isDps&&c.battle)?"na":"miss"); }
      const fdS=c.food?"good":"miss";
      const td=(s,glyph,first)=>`<td class="cc${first?" cbsep":""}${s==="miss"?" cmiss":""}">${glyph}</td>`;
      row+=td(fS,gly(fS),true)+td(bS,gly(bS))+td(gS,gly(gS))+td(fdS,gly(fdS));
    }
    body+=row+`</tr>`;
  }
  // Legend key above the table — ties each yellow column letter to its full name (same SUB source).
  const legend=`<div class="clegend">${SUB.map(([s,full])=>`<span class="ckey"><b>${s}</b>${esc(full)}</span>`).join("")}</div>`;
  return `${legend}<div class="cmwrap"><table class="cmatrix"><thead>${h1}${h2}</thead><tbody>${body}</tbody></table></div>`;
}
// In-combat consumable USAGE matrix (ours only): P combat potion · MP mana pot · HS healthstone, per
// player × boss. ✓count = used, faint dash = not used (NOT red — usage is situational). Counts come from
// cast EVENTS (the Casts table caps each player at 5 abilities, which hid the consumables). Health potions
// are not tracked (unused in TBC raids). HS is warlock-dependent: no warlock → the column shows unavailable.
function inCombatMatrix(ic){
  const bosses=rowsOf(ic.bosses), players=rowsOf(ic.players);
  if(!bosses.length||!players.length) return '<p class="num" style="padding:8px 2px">No in-combat consumable data.</p>';
  const hasWarlock=ic.hasWarlock!==false;
  const SUB=[["P","Combat Potion"],["MP","Mana Potion"],["HS","Healthstone"]];
  const na='<span class="cna">·</span>';
  let h1=`<tr><th class="cmname" rowspan="2">Player</th>`, h2=`<tr>`;
  for(const b of bosses){
    h1+=`<th class="cbgrp" colspan="${SUB.length}" title="${esc(b.name)}"><span class="cbname">${esc(b.name)}</span></th>`;
    h2+=SUB.map(([s,full],i)=>`<th class="csub2${i===0?' cbsep':''}" title="${full}">${s}</th>`).join("");
  }
  h1+=`</tr>`; h2+=`</tr>`;
  const keys=["P","MP","HS"];
  let body="";
  for(const p of players){
    let row=`<tr><td class="cmname pname" style="color:${cc(p.class)}">${esc(p.name)} <span class="role">${esc(p.spec||p.role)}</span></td>`;
    for(const b of bosses){
      const c=p.cells?p.cells[String(b.encounterID)]:null;
      if(!c||!c.present){ row+=SUB.map((_,i)=>`<td class="cc${i===0?' cbsep':''}">${na}</td>`).join(""); continue; }
      row+=keys.map((k,i)=>{
        const unavail=(k==="HS"&&!hasWarlock);
        const v=c[k]||0;
        // Green NUMBER when used (the count itself signals "good" — no separate ✓). When the raider
        // attended but didn't press it, a faint gray ✗ marks the empty slot explicitly — matching the
        // visual language of the Prep matrix above (so a blank never reads as ambiguous). HS with no
        // warlock stays a dash (the consumable doesn't exist for this raid, not "had it and skipped").
        const cls=unavail?"cna":(v>0?"cyes":"cna");
        const glyph=unavail?"–":(v>0?String(v):"✗");
        return `<td class="cc${i===0?' cbsep':''}"><span class="${cls}">${glyph}</span></td>`;
      }).join("");
    }
    body+=row+`</tr>`;
  }
  const wlNote=hasWarlock?"":` <span class="warnpill" style="font-weight:600">No warlock — healthstones unavailable.</span>`;
  const legend=`<div class="clegend">${SUB.map(([s,full])=>`<span class="ckey"><b>${s}</b>${esc(full)}</span>`).join("")}${wlNote}</div>`;
  return `${legend}<div class="cmwrap"><table class="cmatrix"><thead>${h1}${h2}</thead><tbody>${body}</tbody></table></div>`;
}
// Throughput consumables: combat-potion activations by spec (clean throughput gap, ours vs benchmark)
// + which specific flasks / battle elixirs each raid runs (the meta, discovered from the benchmark).
function throughputView(d){
  const dp=d.deep; if(!dp) return "";
  let h="";
  // Only specs BOTH raids fielded belong here — comparing a spec one raid never ran is apples-to-oranges
  // (a data-integrity violation). The builder already gates potionGap to the spec INTERSECTION; we also
  // require a real player on each side here as a belt-and-suspenders guard, then drop 0-vs-0 (neither
  // potted that overlapping spec — no gap to show).
  const pg=rowsOf(dp.potionGap).filter(r=>r.oursPlayers>0&&r.theirsPlayers>0&&(r.ours>0||r.theirs>0));
  if(pg.length){
    // Which specific potions a side used, e.g. "Haste ×12 · Destruction ×3" (most-used first).
    const potList=(pots)=>{const a=asArr(pots).filter(p=>p&&p.count>0); return a.length?a.map(p=>`${esc(p.name)} ×${p.count}`).join(" · "):"—";};
    h+=`<h2 class="section">Throughput Potions — By Spec<span class="hint">Combat potions fired per spec, pooled across shared bosses (specs <b>both raids ran</b>). Potions are free DPS, so a spec the benchmark pots more than you (red) is a repeatable gap; the line under each names which. Higher is better.</span></h2>
      <table><thead><tr><th>Spec</th><th>${esc(d.ours.title)}</th><th>${esc(d.theirs.title)}</th><th>Δ total</th></tr></thead><tbody>`;
    for(const r of pg){
      const dl=deltaHigh(r.ours,r.theirs); // more pots = better
      h+=`<tr><td style="font-weight:600;color:${cc(r.class)}">${esc(r.spec)} ${esc(r.class)}</td>
        <td class="num" style="color:var(--ours);font-weight:600">${r.ours} <span class="role" style="font-weight:400">(${r.oursAvg}/player)</span><br><span class="role" style="font-weight:400">${potList(r.oursPots)}</span></td>
        <td class="num" style="color:var(--theirs);font-weight:600">${r.theirs} <span class="role" style="font-weight:400">(${r.theirsAvg}/player)</span><br><span class="role" style="font-weight:400">${potList(r.theirsPots)}</span></td>
        <td class="delta ${dl.cls}">${dl.txt}</td></tr>`;
    }
    h+=`</tbody></table>`;
  }
  // (The "Throughput Consumable Choices" flask/battle-elixir meta table was removed — it was
  // descriptive only and revealed no actionable gap; the combat-potion gap above carries the signal.)
  return h;
}
// Prepot timing (EXPERIMENTAL): did the throughput potion land ON THE PULL (the TBC opener prepot)?
// The TIMING decomposition of the potion-uses count. Raid-aggregate (bands merge players) → a raid-level
// yes/no per boss, not a per-player prepotter count.
function prepotView(d){
  const p=d.deep&&d.deep.prepot; if(!p||!p.ours) return "";
  const o=p.ours, t=p.theirs||{};
  if(!o.totalBosses) return "";
  const oD=`${o.prepotBosses}/${o.totalBosses}`, tD=t.totalBosses?`${t.prepotBosses}/${t.totalBosses}`:"—";
  const dl=t.totalBosses?deltaHigh(o.prepotBosses,t.prepotBosses):{cls:"flat",txt:""};
  // Per-boss: when the first throughput-potion band started (sec into the fight). ≤3s ≈ on the pull.
  const tByEnc={}; for(const b of asArr(t.bosses)) tByEnc[b.encounterID]=b;
  const secTxt=b=> !b.used?`<span class="no">none</span>`:(b.prepot?`<span class="yes">on pull</span>`:`<span class="bad">+${b.sec}s</span>`);
  let h=`<h2 class="section">Opener Potion — Prepot<span class="xp">Experimental</span><span class="hint">Did the raid's <b>opener potion land on the pull</b>, so its buff hits the opener? Every combat potion shares one <b>2-min cooldown</b>, so a prepot isn't free — but it buffs your best window and brings the next potion sooner. First potion buff vs pull (≤3s ≈ on pull). <b>Raid-level. Experimental.</b></span></h2>
  <div class="cards">
    <div class="card"><div class="label">Bosses Prepotted</div><div class="vals"><span class="v ours">${oD}</span><span class="v theirs">${tD}</span><span class="delta ${dl.cls}">${dl.txt}</span></div></div>
  </div>
  <table style="margin-top:12px"><thead><tr><th>Boss</th><th>${esc(d.ours.title)}</th><th>${esc(d.theirs.title)}</th></tr></thead><tbody>`;
  for(const b of asArr(o.bosses)){
    const tb=tByEnc[b.encounterID];
    h+=`<tr><td style="font-weight:600">${esc(b.name)}</td><td class="num">${secTxt(b)}</td><td class="num">${tb?secTxt(tb):"—"}</td></tr>`;
  }
  return h+`</tbody></table>`;
}
function metricBars(label,o,t,fmt,maxVal,lowerBetter){
  const f=fmt||(x=>x), max=maxVal||Math.max(o,t,1), w=v=>Math.max(6,Math.round(v/max*100));
  // Format the delta magnitude with the same formatter as the bar values, so e.g. a kill-time
  // delta reads "−1:08" (not a raw millisecond count) and a Raid DPS delta reads "+7.8k".
  const diff=o-t, mag=Math.round(Math.abs(diff)*10)/10;
  let dcls="flat",dtxt="even";
  if(mag!==0){const better=lowerBetter?diff<0:diff>0;dcls=better?"good":"bad";dtxt=(diff>0?"+":"−")+f(mag);}
  return `<div class="metric"><div class="mlabel"><span>${label}</span><span class="delta ${dcls}">${dtxt}</span></div>
    <div class="barrow">
      <div class="bar"><div class="fill ours" style="width:${w(o)}%"></div><span class="tag">${f(o)}</span></div>
      <div class="bar"><div class="fill theirs" style="width:${w(t)}%"></div><span class="tag">${f(t)}</span></div>
    </div></div>`;
}

/* ---------- BIGGEST GAPS SCORECARD ---------- */
function gapsScorecard(d){
  const gaps=rowsOf(d.gapsScorecard);
  if(!gaps.length) return "";
  const lab={high:"Critical",med:"Notable",low:"Minor"};
  const cards=gaps.map(g=>`<div class="gapcard ${esc(g.level)}">
    <div class="gt">${esc(g.title)}<span class="sev">${esc(lab[g.level]||g.level)}</span></div>
    <div class="gd">${esc(g.text)}</div></div>`).join("");
  return `<h2 class="section">Biggest Gaps vs Benchmark<span class="hint">Where you trail the benchmark most, ranked — start at the top. Severity is distance from the benchmark, not absolute quality. Drawn from every dimension in this report (parses, kill time, deaths, output, prep, comp).</span></h2>
    <div class="gaps">${cards}</div>`;
}

/* ---------- WHAT YOU'RE DOING WELL (positive mirror of the gaps) ---------- */
function didWellScorecard(d){
  const wins=rowsOf(d.didWell);
  if(!wins.length) return "";
  const cards=wins.map(w=>`<div class="gapcard win">
    <div class="gt">${esc(w.title)}<span class="sev">Strength</span></div>
    <div class="gd">${esc(w.text)}</div></div>`).join("");
  return `<h2 class="section">What You're Doing Well<span class="hint">Where you match or beat the benchmark, ranked by margin — the flip side of the gaps. Protect these; don't trade them away chasing a gap above.</span></h2>
    <div class="gaps">${cards}</div>`;
}

/* ---------- OVERVIEW ---------- */
function renderOverview(d){
  const s=d.summary, parseD=deltaHigh(s.oursAvgParse,s.theirsAvgParse),
    deathD=deltaLow(s.oursDeaths,s.theirsDeaths), timeD=deltaLow(Math.round(s.oursDurationMs/1000),Math.round(s.theirsDurationMs/1000));
  const wipeCard=s.hasAttempts?`<div class="card"><div class="label">Total Wipes</div><div class="vals"><span class="v ours">${s.oursWipes}</span><span class="v theirs">${s.theirsWipes}</span><span class="delta ${deltaLow(s.oursWipes,s.theirsWipes).cls}">${deltaLow(s.oursWipes,s.theirsWipes).txt}</span></div></div>`:"";
  const posHl=(d.deep&&d.deep.positioning&&d.deep.positioning.headline)||"";
  let h=gapsScorecard(d)+didWellScorecard(d)+posHl+`<h2 class="section">Raid Summary</h2><div class="cards">
    <div class="card"><div class="label">Avg Raid Parse</div><div class="vals"><span class="v ours">${s.oursAvgParse}</span><span class="v theirs">${s.theirsAvgParse}</span><span class="delta ${parseD.cls}">${parseD.txt}</span></div></div>
    <div class="card"><div class="label">Total Deaths${s.nightWideDeaths?` <span class="hint">trash + all pulls</span>`:``}</div><div class="vals"><span class="v ours">${s.oursDeaths}</span><span class="v theirs">${s.theirsDeaths}</span><span class="delta ${deathD.cls}">${deathD.txt}</span></div></div>
    <div class="card"><div class="label">Total Boss Kill Time</div><div class="vals"><span class="v ours">${fmtTime(s.oursDurationMs)}</span><span class="v theirs">${fmtTime(s.theirsDurationMs)}</span><span class="delta ${timeD.cls}">${timeD.txt}s</span></div></div>
    ${wipeCard}
  </div><p class="srcs" style="margin:12px 0 0">Per-fight kill time, parse, rosters and the full execution drill-down now live on the <b>Bosses</b> tab.</p>`;
  return h;
}
/* ---------- COMPOSITION / ENCHANTS / BOSSES ---------- */

/* ---------- COMPOSITION ---------- */
function renderComposition(d){
  const dp=d.deep; if(!dp) return "<p>No composition data.</p>";
  const comp=dp.composition; if(!comp) return "<p>No composition data.</p>";
  let h="";
  /* Spec coverage diff folded INTO the roster tiles: a spec only one side fields is highlighted in
     its own tile — red on the benchmark's roster ("they bring it, you don't" = a comp gap), blue on
     ours ("your edge"). What each such spec contributes is left to the buff table below. */
  const sd=comp.specDiff||{};
  const miss=rowsOf(sd.missing), edge=rowsOf(sd.edge);
  const ck=(cls,sp)=>cls+" "+sp;
  const onlyTheirs=new Set(miss.map(r=>ck(r.class,r.spec)));
  const onlyOurs=new Set(edge.map(r=>ck(r.class,r.spec)));
  const chips=(arr,side)=>asArr(arr).map(c=>{
    const specs=asArr(c.specs).map(s=>{
      const uniq = side==="ours" ? onlyOurs.has(ck(c.class,s.spec)) : onlyTheirs.has(ck(c.class,s.spec));
      const tag = uniq ? (side==="ours"?" edge":" gap") : "";
      return `<span class="specline${tag}">${s.count} ${esc(s.spec)}</span>`;
    }).join("");
    return `<div class="ccard" style="border-color:${cc(c.class)}55"><div class="chead" style="color:${cc(c.class)}">${esc(c.class)} ${c.count}</div><div class="cspecs">${specs}</div></div>`;
  }).join("");
  const legend = (miss.length||edge.length) ? `<div class="covlegend">${miss.length?`<span class="covkey gap">They bring, you don't · ${miss.length}</span>`:""}${edge.length?`<span class="covkey edge">Your edge · ${edge.length}</span>`:""}</div>` : "";
  h+=`<h2 class="section">Raid Composition &amp; Buff Coverage<span class="hint">Roster from the bosses both raids killed. A <b class="cgap">red spec</b> is one the benchmark fields and you don't (a comp gap, sometimes a missing buff); a <b class="cedge">blue spec</b> is one only you bring. The buff table below shows what each contributes.</span></h2>
  ${legend}
  <div class="twocol">
    <div><h4 class="ours">${esc(d.ours.title)} · ${comp.oursSize} players</h4><div class="complist">${chips(comp.oursClasses,"ours")}</div></div>
    <div><h4 class="theirs">${esc(d.theirs.title)} · ${comp.theirsSize} players</h4><div class="complist">${chips(comp.theirsClasses,"theirs")}</div></div>
  </div>`;

  // Provider COUNT, not just ✓/✗ (EXPERIMENTAL). The honest reading depends on the buff's scope:
  //  • group-scoped (Windfury/Bloodlust/Battle Shout/Trueshot/Ferocious Insp/LotP land on the provider's
  //    party) → more providers = more groups covered, so a count delta is a clean coverage signal.
  //  • raid-scoped (boss debuffs: Misery/Imp FF/CoE/Imp Scorch/JoW/Expose) → ONE provider delivers it in
  //    full, so extra copies are only INSURANCE — a count delta isn't better/worse, but count==1 is a
  //    single-point-of-failure (one death/absence and the raid loses the buff). Count matching inherits
  //    has_provider's spec-name logic, so a WCL spec variant (e.g. "Dreamstate" boomkin) can read 0 — same
  //    caveat the binary check already carried.
  h+=`<h2 class="section" style="margin-top:26px">Provider Count &amp; Coverage<span class="xp">Experimental</span><span class="hint"><b>How many</b> providers each side fields. For <b>group-scoped</b> buffs (Windfury, Battle Shout, Trueshot, Leader of the Pack — party-only) more providers = more groups covered, the lever. For <b>raid-scoped</b> boss debuffs (Misery, CoE, Faerie Fire…) one provider covers everyone; extras are insurance, a <b>single provider</b> is a failure point. <b>Experimental.</b></span></h2>`;
  h+=`<table><thead><tr><th>Provided by</th><th>Raid contribution</th><th>Scope</th><th>${esc(d.ours.title)}</th><th>${esc(d.theirs.title)}</th><th>Status</th><th>Why it matters</th></tr></thead><tbody>`;
  for(const g of asArr(comp.gaps)){
    const oc=g.oursCount!=null?g.oursCount:(g.ours?1:0), tc=g.theirsCount!=null?g.theirsCount:(g.theirs?1:0);
    const group=g.scope==="group";
    let tag, rowgap=false;
    if(oc===0&&tc>0){ tag=`<span class="tag2 gap">missing</span>`; rowgap=true; }
    else if(oc===0&&tc===0){ tag=`<span class="tag2">neither</span>`; }
    else if(group&&oc<tc){ tag=`<span class="tag2 gap">−${tc-oc} coverage</span>`; rowgap=true; }
    else if(group&&oc>tc){ tag=`<span class="tag2 edge">+${oc-tc} coverage</span>`; }
    else if(!group&&oc===1){ tag=`<span class="tag2" style="background:#3a2f12;color:#e8c34a;border-color:#5a4a1a">single provider</span>`; }
    else if(tc===0&&oc>0){ tag=`<span class="tag2 edge">your edge</span>`; }
    else { tag=`<span class="tag2 ok">both</span>`; }
    // Group buffs show the raw count (coverage); raid buffs show ✓ with a backup hint when >1.
    const cell=n=> n>0 ? `<span class="yes">${group?`${n}×`:`✓${n>1?` <span class="num">(×${n})</span>`:""}`}</span>` : `<span class="no">✗</span>`;
    const prov = g.spec?`${esc(g.spec)} ${esc(g.class)}`:`Any ${esc(g.class)}`;
    h+=`<tr class="gaprow ${rowgap?'isgap':''}"><td class="prov" style="color:${cc(g.class)}">${prov}</td>
      <td>${esc(g.buff)}</td>
      <td><span class="num" style="font-size:11px;opacity:.8">${group?"group":"raid-wide"}</span></td>
      <td>${cell(oc)}</td>
      <td>${cell(tc)}</td>
      <td>${tag}</td><td class="num">${esc(g.impact)}</td></tr>`;
  }
  h+=`</tbody></table>`;
  return h;
}

/* ---------- ENCHANTS & GEMS ---------- */
function renderEnchants(d){
  const dp=d.deep; if(!dp) return "<p>No enchant data.</p>";
  const au=dp.audit; if(!au) return "<p>No enchant data.</p>";
  let h="";
  const meD=deltaLow(au.ours.totalMissingEnchants,au.theirs.totalMissingEnchants);
  const oilD=deltaLow(au.ours.playersNoWeaponOil,au.theirs.playersNoWeaponOil);
  const feD=deltaHigh(au.ours.fullyEnchanted,au.theirs.fullyEnchanted);
  const ilvlD=deltaHigh(au.ours.avgIlvl||0,au.theirs.avgIlvl||0);
  // Labeled stat card: each value tagged with its team name so the Enchants tab is self-explanatory.
  const oT=esc(d.ours.title), tT=esc(d.theirs.title);
  const acard=(label,ov,tv,dl)=>`<div class="card"><div class="label">${label}</div><div class="vals">`+
    `<span class="vcol"><span class="v ours">${ov}</span><span class="vlab ours">${oT}</span></span>`+
    `<span class="vcol"><span class="v theirs">${tv}</span><span class="vlab theirs">${tT}</span></span>`+
    (dl?`<span class="delta ${dl.cls}">${dl.txt}</span>`:"")+`</div></div>`;

  /* Consumable coverage — the biggest bad-guild → good-guild gap. */
  const cons=dp.consumables;
  if(cons&&cons.ours&&cons.theirs){
    const co=cons.ours, ct=cons.theirs;
    h+=`<h2 class="section">Consumables Coverage<span class="hint">Raiders who showed up prepared, counted <b>per raider</b> across shared bosses — counted when prepped on <b>at least half</b> the bosses they attended. "Prepared" = a <b>flask</b>, <b>battle elixir</b> (DPS), or <b>full battle + guardian pair</b> (healer/tank); Food is Well Fed. Detail in the matrix below.</span></h2>
    <div class="cards">
      ${acard("Flasked / Elixir Pair",`${co.flask}/${co.rosterSize}`,`${ct.flask}/${ct.rosterSize}`,deltaHigh(co.flask,ct.flask))}
      ${acard("Food (Well Fed)",`${co.food}/${co.rosterSize}`,`${ct.food}/${ct.rosterSize}`,deltaHigh(co.food,ct.food))}
    </div>`;
  }

  /* Per-player consumables matrix — bosses across the top, offenders at the top. */
  const ppc=dp.perPlayerConsumes;
  if(ppc&&rowsOf(ppc.players).length){
    h+=`<h2 class="section">Per-Player Consumables — Prep<span class="hint">Each raider in ${oT} × each shared boss; the yellow <b>F · B · G · Fd</b> columns are keyed above the table. "Prepared" = a <b>flask</b>, a <b>battle elixir</b> (DPS), or a <b>battle + guardian pair</b> (healer/tank), plus food. <span style="color:var(--good)">✓</span>=had it · <span style="color:var(--bad)">✗</span> (red)=missing &amp; needed · <span style="opacity:.6">✗ faint</span>=not needed that way (e.g. elixirs cover the flask). Sorted worst-prepared first; Prep = bosses consumed / played. Source: per-player buff tables (catches pre-pull consumables). Combat potions are in the in-combat matrix below.</span></h2>
    ${consumeMatrix(ppc)}`;
  }

  /* In-combat consumables matrix — the consumables you press DURING the fight. */
  const ic=dp.perPlayerInCombat;
  if(ic&&rowsOf(ic.players).length){
    h+=`<h2 class="section">Per-Player Consumables — In Combat<span class="hint">Consumables pressed <b>during</b> the fight: <b>P</b> combat potion · <b>MP</b> mana · <b>HS</b> healthstone. A <span style="color:var(--good)">green count</span> = used on that boss; a <span style="opacity:.6">faint ✗</span> = a slot the raider had but didn't press. A <b>usage</b> view, not pass/fail — situational items like a mana pot or healthstone aren't flagged red. Sorted by least combat-potion use first. Source: per-player buff &amp; cast tables.</span></h2>
    ${inCombatMatrix(ic)}`;
  }

  /* Throughput consumable choices — combat-potion gap by spec + which flasks/elixirs (the meta). */
  h+=throughputView(d);

  /* Prepot (EXPERIMENTAL) — did the opener potion land ON THE PULL? The timing of the potion count. */
  h+=prepotView(d);

  h+=`<h2 class="section">Enchants &amp; Weapon Oils<span class="hint">Per-player prep across the shared-boss roster. Missing enchants and weapon oils/stones are free damage/survivability left on the table. For melee, <b>Windfury Totem counts as a weapon-slot buff</b> — a melee in a Windfury group shows covered (✓ WF), not flagged. Enchants and weapon oils only; potions are in the matrices above.</span></h2>
  <div class="cards">
    ${acard("Missing Enchants (raid)",au.ours.totalMissingEnchants,au.theirs.totalMissingEnchants,meD)}
    ${acard("Fully Enchanted Players",`${au.ours.fullyEnchanted}/${au.ours.playerCount}`,`${au.theirs.fullyEnchanted}/${au.theirs.playerCount}`,feD)}
    ${acard("No Weapon Oil/WF",au.ours.playersNoWeaponOil,au.theirs.playersNoWeaponOil,oilD)}
    ${acard("Avg Item Level",au.ours.avgIlvl||"—",au.theirs.avgIlvl||"—",ilvlD)}
  </div>
  <h4 class="ours">${esc(d.ours.title)} — per-player preparation</h4>
  <table><thead><tr><th>Player</th><th>Role</th><th>Missing Enchants</th><th>Wpn Oil/WF</th></tr></thead><tbody>`;
  const pls=[...asArr(au.ours.players)].sort((a,b)=>b.missingCount-a.missingCount);
  for(const p of pls){
    const miss=asArr(p.missingEnchants);
    // ✓ = oil applied; ✓ WF = melee covered by a Windfury group (no oil needed); ✗ = a real gap.
    const oilCell=p.weaponOil?'<span class="yes">✓</span>':(p.weaponCovered?'<span class="yes" title="Windfury group — oil not needed">✓ WF</span>':'<span class="no">✗</span>');
    h+=`<tr><td class="pname" style="color:${cc(p.class)}">${esc(p.name)}</td><td class="role">${esc(p.role)}</td>
      <td>${miss.length?`<span class="warnpill">${miss.map(esc).join(", ")}</span>`:'<span class="yes">✓ full</span>'}</td>
      <td>${oilCell}</td></tr>`;
  }
  h+=`</tbody></table>`;

  /* Hit & Expertise (EXPERIMENTAL) — gear-sourced hit% per raider vs the benchmark's same-spec target. */
  h+=hitCapView(d);

  /* Item level by role — is a specific role (often healers) under-geared, vs one raid-wide avg? */
  const ob=dp.outputBreakdown;
  if(ob&&ob.oursRoleIlvl){
    const ro=ob.oursRoleIlvl, rt=ob.theirsRoleIlvl||{};
    const rc=(label,o,t)=>acard(label,o||"—",t||"—",(o&&t)?deltaHigh(o,t):null);
    h+=`<h2 class="section">Item Level by Role<span class="hint">Average equipped item level by role, so an under-geared role (often healers) stands out instead of hiding inside the raid-wide average above.</span></h2>
    <div class="cards">${rc("DPS Item Level",ro.dps,rt.dps)}${rc("Healer Item Level",ro.healer,rt.healer)}${rc("Tank Item Level",ro.tank,rt.tank)}</div>`;
  }
  return h;
}

/* ---------- HIT & EXPERTISE (combatantInfo.stats) — EXPERIMENTAL ---------- */
// Per-raider gear-sourced hit% vs the benchmark's same-spec target (capped at the textbook hit cap).
// The one report view (besides Optimize) that's per-raider — a gear FIX, not a skill judgment.
function hitCapView(d){
  const sa=d.deep&&d.deep.statAudit; const pls=sa?rowsOf(sa.players):[];
  if(!pls.length) return "";
  const s=sa.summary, oT=esc(d.ours.title), tT=esc(d.theirs.title);
  const acard=(label,ov,tv,dl)=>`<div class="card"><div class="label">${label}</div><div class="vals">`+
    `<span class="vcol"><span class="v ours">${ov}</span><span class="vlab ours">${oT}</span></span>`+
    `<span class="vcol"><span class="v theirs">${tv}</span><span class="vlab theirs">${tT}</span></span>`+
    (dl?`<span class="delta ${dl.cls}">${dl.txt}</span>`:"")+`</div></div>`;
  // One avg-hit card per hit type present (caster spell / melee / ranged) — EFFECTIVE hit, ours vs bench.
  const tcard=(label,o)=> (o&&o.ours!=null)?
    acard(label,o.ours+"%",(o.theirs!=null?o.theirs+"%":"—"),(o.theirs!=null?deltaHigh(o.ours,o.theirs):null)):"";
  let cards=tcard("Avg Caster Spell Hit",s.spell)+tcard("Avg Melee Hit",s.melee)+tcard("Avg Ranged Hit",s.ranged);
  cards+=`<div class="card"><div class="label">Raiders Under Hit Target</div><div class="vals"><span class="v ${s.oursUnder>0?'theirs':'ours'}">${s.oursUnder}</span><span class="num">/ ${s.playerCount}</span></div></div>`;
  // Effective hit is gear + talent + raid; note the per-side raid spell-hit so the breakdown is transparent.
  const env=s.spellEnv||{ours:0,theirs:0};
  const envTxt=p=>p>0?`+${p}% Imp. Faerie Fire`:"none";
  const envNote=`<p class="srcs" style="margin:8px 0 0"><b>Effective hit = gear + talent + raid.</b> <b>Talent</b> is the spec's standard PvE build, assumed in full (e.g. Shadow Focus +10%, Balance of Power +4%, Precision +5%). <b>Raid</b> spell-hit (Imp. Faerie Fire) — <span class="cours">${oT}</span>: ${envTxt(env.ours)} · <span class="cthe">${tT}</span>: ${envTxt(env.theirs)}. Not modeled (party-scoped / partial, and they cancel between similar raids): Totem of Wrath, Heroic Presence, Warlock Suppression.</p>`;
  let h=`<h2 class="section">Hit &amp; Expertise<span class="xp">Experimental</span><span class="hint">Per-raider <b>effective hit</b> = <b>gear + talent + raid</b> vs the benchmark. Gear from <code>combatantInfo</code>; talent assumed taken; raid = Improved Faerie Fire (+3% with a Balance Druid). Under-hit = missed casts, fixable with gems/enchants/gear. <b>Target</b> = benchmark hit, capped (spell 16% · melee/ranged 9%). Healers excluded. <b>Experimental</b> — talent assumed; treat borderline rows as a prompt.</span></h2>
  <div class="cards">${cards}</div>${envNote}
  <h4 class="ours">${oT} — hit &amp; expertise by raider</h4>
  <table><thead><tr><th>Player</th><th>Spec</th><th>Gear</th><th>Talent</th><th>Raid</th><th>Effective</th><th>Target</th><th>Expertise</th></tr></thead><tbody>`;
  for(const p of pls){
    const pct=v=>v>0?v+"%":'<span class="cna">—</span>';   // 0 sources read as a muted dash
    const hitCell=`<b style="color:${p.under?'var(--bad)':'var(--txt)'}">${p.effPct}%</b> <span class="num">${p.hitRating} rtg</span>`;
    const tgtCell=`${p.target}%`+(p.under?` <span class="tag2 gap">−${p.gap}%</span>`:"");
    const expCell=p.physical?(`${p.expertise}`+(p.benchExp!=null?` <span class="num">(bench ${p.benchExp})</span>`:"")):'<span class="cna">—</span>';
    h+=`<tr class="${p.under?'isgap':''}"><td class="pname" style="color:${cc(p.class)}">${esc(p.name)}</td>
      <td class="num">${esc(p.spec)}</td>
      <td class="num">${p.gearPct}%</td><td class="num">${pct(p.talentPct)}</td><td class="num">${pct(p.raidPct)}</td>
      <td>${hitCell}</td><td>${tgtCell}</td><td class="num">${expCell}</td></tr>`;
  }
  return h+`</tbody></table>`;
}

/* ---------- EXECUTION (raid-wide gaps) ---------- */
// Raid-wide execution gaps across the whole shared clear. The per-boss drill-down moved to the Bosses tab.
function renderExecution(d){
  const dp=d.deep; if(!dp) return "<p>No execution data.</p>";
  let h="";

  /* 0a. Output quality (activity / overheal / damage taken / raid output) — the macro "are we winning?"
     read leads the tab, before the drill-down below (consistent with the Overview's summary-first order). */
  const q=dp.quality;
  if(q){
    const actD=deltaHigh(q.oursActivity,q.theirsActivity), ohD=deltaLow(q.oursOverheal,q.theirsOverheal);
    const persec=dmgMode==="persec";
    const dmO=persec?q.oursDtps:q.oursDmgTaken, dmT=persec?q.theirsDtps:q.theirsDmgTaken;
    const dmFmt=persec?(x=>x.toLocaleString()):fmtM;
    const dmDiff=Math.round(dmO-dmT);
    const dmD={cls:dmDiff===0?"flat":(dmDiff<0?"good":"bad"),txt:dmDiff===0?"even":((dmDiff>0?"+":"−")+dmFmt(Math.abs(dmDiff)))};
    h+=`<h2 class="section">Output Quality<span class="hint">Averaged across shared bosses. <b>Activity</b> = active GCD time ÷ fight duration, measured <i>inside each boss fight only</i> (dead GCDs from movement/range count; between-pull breaks don't). <b>Overheal</b> = healing landed on full bars (wasted). <b>Damage taken</b> excludes tanks → approximates avoidable damage; toggle per-second (normalizes kill time) vs total.</span></h2>
    <div class="segwrap"><span class="lbl">Damage taken</span><div class="seg">
      <button class="dmgbtn ${persec?'on':''}" data-mode="persec">Per second</button>
      <button class="dmgbtn ${persec?'':'on'}" data-mode="total">Overall</button>
    </div></div>
    <div class="cards">
      <div class="card"><div class="label">Raid DPS</div><div class="vals"><span class="v ours">${fmtR(q.oursRaidDps||0)}</span><span class="v theirs">${fmtR(q.theirsRaidDps||0)}</span><span class="delta ${deltaRate(q.oursRaidDps||0,q.theirsRaidDps||0).cls}">${deltaRate(q.oursRaidDps||0,q.theirsRaidDps||0).txt}</span></div></div>
      <div class="card"><div class="label">Avg DPS Activity</div><div class="vals"><span class="v ours">${q.oursActivity}%</span><span class="v theirs">${q.theirsActivity}%</span><span class="delta ${actD.cls}">${actD.txt}</span></div></div>
      <div class="card"><div class="label">${persec?"Dmg Taken/s (ex-tanks)":"Dmg Taken (ex-tanks)"}</div><div class="vals"><span class="v ours">${dmFmt(dmO)}</span><span class="v theirs">${dmFmt(dmT)}</span><span class="delta ${dmD.cls}">${dmD.txt}</span></div></div>
      <div class="card"><div class="label">Raid HPS</div><div class="vals"><span class="v ours">${fmtR(q.oursRaidHps||0)}</span><span class="v theirs">${fmtR(q.theirsRaidHps||0)}</span><span class="delta ${deltaRate(q.oursRaidHps||0,q.theirsRaidHps||0).cls}">${deltaRate(q.oursRaidHps||0,q.theirsRaidHps||0).txt}</span></div></div>
      <div class="card"><div class="label">Avg Healer Overheal</div><div class="vals"><span class="v ours">${q.oursOverheal}%</span><span class="v theirs">${q.theirsOverheal}%</span><span class="delta ${ohD.cls}">${ohD.txt}</span></div></div>
    </div>`;
    if(q.dpsDiagnosis) h+=`<p class="srcs" style="margin:10px 0 0;line-height:1.5"><b>DPS gap diagnosis:</b> ${esc(q.dpsDiagnosis)} <span style="opacity:.8">(an estimate from the Raid DPS and Activity figures above — activity is the DPS core's, raid DPS is whole-raid.)</span></p>`;
  }

  /* 0b. Clear efficiency — wall-clock vs in-combat (where time leaks between pulls). The other macro read. */
  const e=dp.efficiency;
  if(e){
    const spanD=deltaLow(Math.round(e.ours.spanMs/60000),Math.round(e.theirs.spanMs/60000));
    const dtD=deltaLow(Math.round(e.ours.downtimeMs/60000),Math.round(e.theirs.downtimeMs/60000));
    h+=`<h2 class="section">Clear Efficiency<span class="hint">Wall-clock vs time spent in boss fights, <b>scoped to the shared bosses</b> (first pull to last kill of the encounters both raids did) — so a benchmark that also cleared another zone isn't charged for its whole night. The gap is trash, wipes, and breaks.</span></h2>
    <div class="cards">
      <div class="card"><div class="label">Raid Wall-clock</div><div class="vals"><span class="v ours">${fmtMin(e.ours.spanMs)}</span><span class="v theirs">${fmtMin(e.theirs.spanMs)}</span><span class="delta ${spanD.cls}">${spanD.txt}m</span></div></div>
      <div class="card"><div class="label">In Boss Fights</div><div class="vals"><span class="v ours">${fmtMin(e.ours.combatMs)}</span><span class="v theirs">${fmtMin(e.theirs.combatMs)}</span></div></div>
      <div class="card"><div class="label">Out of Boss (trash/wipes)</div><div class="vals"><span class="v ours">${fmtMin(e.ours.downtimeMs)}</span><span class="v theirs">${fmtMin(e.theirs.downtimeMs)}</span><span class="delta ${dtD.cls}">${dtD.txt}m</span></div></div>
    </div>`;
  }

  /* 1. What's killing us — killing blows aggregated across the whole shared clear. */
  h+=deathCausesView(d);

  /* (Ghost Run moved to the per-boss Timeline sub-tab as an interactive overlay — toggle the ghost
     DPS line + projected kill time, per-death, where the fight's shape gives it context. See ghostInner.) */

  /* 1b. Time lost to deaths (EXPERIMENTAL) — the output-time companion to the count above. */
  h+=deathTimeView(d);

  /* 1c. Avoidable damage by mechanic (EXPERIMENTAL) — the LEADING indicator before the deaths. */
  h+=avoidableDamageView(d);

  /* 2. Lowest-hanging DPS — per-spec gap pooled across every shared boss. */
  h+=tierSpecGapView(d);

  /* 2c. Melee uptime on the boss (EXPERIMENTAL, Positioning) — the GEOMETRIC cause beneath the activity
     gap: were our melee actually in range? Pre-rendered fragment; "" when no non-mobile boss supports it. */
  h+=(d.deep&&d.deep.positioning&&d.deep.positioning.meleeView)||"";

  /* (DPS Ramp cut in the /audit pass: low leverage + an honesty wobble — it's normalized to each raid's
     OWN median, so a weak raid can read a "fast ramp" while its absolute opener DPS trails. The DPS
     timelines on the Bosses tab + the Prep prepot check already cover "ramp faster" more honestly.) */

  /* 3. Buff & debuff coverage gaps — uptime averaged across bosses, biggest deficit first. */
  h+=tierUptimeGapView(d);

  /* 3a-ii. Debuff ramp & continuity (EXPERIMENTAL) — WHEN debuffs land + their longest drop. */
  h+=debuffTimingView(d);

  /* 3b. Interrupts leaked — proven-interruptible casts (kicked ≥1) that went off, tier-wide. */
  h+=leakedInterruptsView(d);

  /* 3c. Cooldown usage (clean better/worse), from Casts + buffs. */
  h+=cdUsageView(d);

  /* 3c-ii. Bloodlust timing + window payoff (EXPERIMENTAL) — when you burst and how much you got. */
  h+=bloodlustView(d);

  /* 3d. Early aggro (threat pulls) + per-target engagement. (Target Focus cut in the /audit pass: a
     raid-wide concentration scalar — "78% vs 82%" — with no lever; the actionable version is Add Control
     below, which names the add to focus/CC.) */
  h+=threatPullsView(d);
  h+=targetEngagementView(d);

  /* (Healing Efficiency by Spec cut in the /audit pass: overheal % rarely the kill constraint and thin
     on same-spec overlap — not a lever a leader acts on.) */

  /* (Wipe Recovery moved to the Wipes tab in the /audit pass — it's wipe-pacing, now thematically home.) */

  return h;
}

/* ---------- BOSSES (per-boss drill-down: execution panel + kill summary) ---------- */
// One boss's execution panel: an output strip + eight analysis sub-tabs (Timeline default when present).
function execPanel(b){
  const lust=(s)=>s==null?'<span class="no">none</span>':fmtTime(s*1000)+" in";
  // Timeline leads when present — the clearest "where in the fight did the gap open" view.
  const at=bossTab[b.encounterID]||(b.timeline?"timeline":"buffs");
  const subs=[];
  if(b.timeline) subs.push({k:"timeline",label:"Timeline"});
  subs.push(
    {k:"buffs",label:"Buff Uptime"},
    {k:"specdps",label:"DPS by Spec"},
    {k:"dmg",label:"Damage Taken"},
    {k:"deaths",label:"Deaths"},
    {k:"intr",label:"Interrupts"},
    {k:"disp",label:"Dispels"},
    {k:"phases",label:"Phases"}
  );
  // Positioning (EXPERIMENTAL) — a server-rendered SVG fragment (the formation map and spread-vs-demand
  // verdict). Only present on non-mobile bosses with a positions file; shown last because it's the
  // newest/most-experimental lens.
  if(b.positioning) subs.push({k:"pos",label:"Positioning"});
  const btabs=subs.map(s=>`<button class="btab ${at===s.k?'on':''}" data-boss="${b.encounterID}" data-bp="${s.k}">${s.label}</button>`).join("");
  const body={

// The Bosses tab: one sub-tab per boss, each pairing that boss's execution panel with its kill summary.

function interruptView(b){
  const I=b.interrupts||{};
  const ab=rowsOf(I.abilities), uk=rowsOf(b.unkicked);
  if(!ab.length && !uk.length) return `<p class="num" style="padding:8px 2px">No interruptible casts on this fight.</p>`;
  // Ability-first GROUPED layout: each interrupted spell is a group header row, and one sub-row per spec
  // that kicked it (either side), so "benchmark used Fire Mage, you used Ele Shaman" reads straight across
  // — Kicked-by-spec | Our Raid | Benchmark. Clearer than cramming both raids' full spec lists into a cell.
  const cnt=(v,who)=>v>0?`<span class="${who}" style="font-weight:600">${v}</span>`:`<span class="cna">·</span>`;
  const abTbl=()=>{
    let h=`<table class="igrp"><thead><tr><th>Kicked by spec</th><th>${esc(DATA.ours.title)}</th><th>${esc(DATA.theirs.title)}</th></tr></thead><tbody>`;
    for(const r of ab){
      // Group header: the interrupted spell + total kicks each side. colspan spans the 3 columns.
      h+=`<tr class="igrphd"><td colspan="3">${esc(r.name)} <span class="role" style="text-transform:none;letter-spacing:0;font-weight:400">· <span class="cours">${r.ours||0}</span> vs <span class="cthe">${r.theirs||0}</span> kicks</span></td></tr>`;
      const specs=asArr(r.specs).filter(s=>s.ours>0||s.theirs>0).sort((a,b)=>Math.max(b.ours,b.theirs)-Math.max(a.ours,a.theirs));
      if(!specs.length){ h+=`<tr><td class="num" colspan="3">No spec attribution recorded.</td></tr>`; continue; }
      for(const s of specs){
        h+=`<tr><td style="color:${cc(s.class)};font-weight:600;padding-left:18px">${s.spec?esc(s.spec)+" ":""}${esc(s.class)}</td>
          <td class="num">${cnt(s.ours,"cours")}</td>
          <td class="num">${cnt(s.theirs,"cthe")}</td></tr>`;
      }
    }
    return h+`</tbody></table>`;
  };
  // Interruptible enemy casts that completed = missed kicks (lower "went off" is better).
  const ukTbl=()=>{
    let h=`<table><thead><tr><th>Interruptible cast</th><th>${esc(DATA.ours.title)} <span class="role">kicked / leaked</span></th><th>${esc(DATA.theirs.title)} <span class="role">kicked / leaked</span></th></tr></thead><tbody>`;
    for(const r of uk){
      const og=r.oursWentOff, tg=r.theirsWentOff;
      h+=`<tr><td style="font-weight:600">${esc(r.name)}</td>
        <td class="num"><span class="yes">${r.oursKicked}</span> / ${og>0?`<span class="warnpill">${og}</span>`:`<span class="yes">0</span>`}</td>
        <td class="num"><span class="yes">${r.theirsKicked}</span> / ${tg>0?`<span class="warnpill">${tg}</span>`:`<span class="yes">0</span>`}</td></tr>`;
    }
    return h+`</tbody></table>`;
  };
  let out=`<div><h4>Abilities Interrupted — by spec<span class="hint" style="display:block">Each interrupted enemy cast and which specs kicked it, ours vs the benchmark. <b>Descriptive</b> — a different assignment isn't better or worse, just how each raid covers interrupts.</span></h4>${ab.length?abTbl():'<p class="num">No casts were interrupted on this fight.</p>'}</div>`;
  if(uk.length) out+=`<div style="margin-top:16px"><h4>Interrupt Success — Kicked vs Leaked<span class="hint" style="display:block">Per ability: <b>kicked</b> = interrupts you landed; <b>leaked</b> = interruptible casts that still went off un-kicked. A <span class="warnpill">highlighted</span> leaked count is a miss — lower is better, 0 leaked is ideal.</span></h4>${ukTbl()}</div>`;
  return out;
}
function deathsView(b){

    list=rowsOf(list);

    let h=`<div><h4 class="${who}">${esc(title)} · ${list.length} death${list.length>1?"s":""}</h4><table><thead><tr><th>When</th><th>Player</th><th>Killed by</th></tr></thead><tbody>`;

function dispelsView(b){

// "What's killing us" — repeated killing blows across the tier are mechanics the raid keeps failing.

// Buff/debuff coverage gaps across all bosses: where we most consistently trail on maintaining an aura.

// Bloodlust timing + window payoff (EXPERIMENTAL): per boss, WHEN each raid popped lust and the DPS

function bloodlustView(d){
  const rows=rowsOf(d.deep&&d.deep.bloodlust&&d.deep.bloodlust.rows);
  if(!rows.length) return "";
  const tsec=s=>s==null?"—":fmtTime(s*1000);          // seconds-into-fight → m:ss
  const cdp=p=>p==null?"—":(p+"%");
  const mult=m=>m==null?"—":("×"+m);
  // One synthesized read per boss — did the burst actually land in the haste window? Combines ALIGNMENT
  // (share of major cooldowns that fired during lust — the fixable habit) with PAYOFF (raid DPS in the
  // 40s window ÷ fight average — >1× = the stacking paid off). The two supporting numbers stay as evidence
  // beneath the verdict; timing is muted context (on-pull vs saved-for-a-phase is strategy, not a target).
  function verdict(cd,m){
    if(cd==null||m==null) return {cls:"flat",txt:"—"};
    if(cd>=80&&m>=1.2) return {cls:"good",txt:"Burst landed"};
    if(cd<60) return {cls:"bad",txt:"CDs spent off-window"};
    if(m<1.05) return {cls:"bad",txt:"Window underused"};
    return {cls:"warn",txt:"Partial — tighten it"};
  }
  let h=`<h2 class="section">Bloodlust — Are You Stacking Burst Into It?<span class="xp">Experimental</span><span class="hint">Per boss: <b>did your burst land in the Bloodlust window?</b> Combines <b>CD alignment</b> (share of cooldowns fired during lust — low = the fixable habit) with <b>payoff</b> (raid DPS in the window ÷ fight average; &gt;1× = paid off). <b>Lust timing</b> is context — on-pull vs saved-for-a-phase is strategy, not a target. <b>Experimental.</b></span></h2>
  <table><thead><tr><th>Boss</th><th>Did burst land?</th><th>CD alignment<br>you vs bench</th><th>Payoff<br>you vs bench</th><th class="role">lust at (you / bench)</th></tr></thead><tbody>`;
  for(const r of rows){
    const v=verdict(r.oursCdPct,r.oursMult);
    const cdl=(r.oursCdPct!=null&&r.theirsCdPct!=null)?deltaHigh(r.oursCdPct,r.theirsCdPct):null;
    const dl=(r.oursMult!=null&&r.theirsMult!=null)?deltaHigh(r.oursMult,r.theirsMult):null;
    h+=`<tr><td style="font-weight:600">${esc(r.boss)}</td>
      <td><span class="delta ${v.cls}" style="font-size:12px">${v.txt}</span></td>
      <td class="num"><span style="color:var(--ours);font-weight:600">${cdp(r.oursCdPct)}</span> <span style="opacity:.55">vs ${cdp(r.theirsCdPct)}</span>${cdl?` <span class="delta ${cdl.cls}">${cdl.txt}</span>`:""}</td>
      <td class="num"><span style="color:var(--ours);font-weight:600">${mult(r.oursMult)}</span> <span style="opacity:.55">vs ${mult(r.theirsMult)}</span>${dl?` <span class="delta ${dl.cls}">${dl.txt}</span>`:""}</td>
      <td class="num role"><span style="color:var(--ours)">${tsec(r.oursSec)}</span> <span style="opacity:.55">/ ${tsec(r.theirsSec)}</span></td></tr>`;
  }
  return h+`</tbody></table>`;
}

// Per-boss DPS-by-spec gap: mirrored bars (ours ← spec → theirs), ranked by per-player deficit so

// Per-boss DPS/HPS over time, ours vs benchmark, on a shared ABSOLUTE-seconds x-axis. Two kills of
// different length line up in real time, so the shorter kill's line simply ends earlier — the read is
// both "where in the fight does the gap open?" and "how much sooner did the benchmark finish?". Curves
// are exact (event-binned upstream), not WCL's smoothed graph, so they agree with Raid DPS elsewhere.
function tlChart(o,t,m1,m2,ghost){
  const OUR="#4ea1ff",THEIR="#e268a8",GRID="#262f40",MUT="#8a96aa",GHOST="#36d399";
  const W=1000,padL=48,padR=14,padT=16, plotW=W-padL-padR, plotH=184, axisY=padT+plotH; // plot fixed; axisY=200
  o=asArr(o).map(Number); t=asArr(t).map(Number);
  const gd=ghost&&ghost.dps?asArr(ghost.dps).map(Number):null;
  const n=Math.max(o.length,t.length); if(n<2) return "";
  const max=Math.max(1,...o,...t,...(gd||[]))*1.08;
  const oDur=m1.durSec||0, tDur=m2.durSec||0, axisMax=Math.max(oDur,tDur,1); // seconds
  const oPh=asArr(m1.phases), tPh=asArr(m2.phases), hasPh=!!(oPh.length||tPh.length);
  const ribY=axisY+38;                 // phase track sits BELOW the x-axis time labels, only when phases exist
  const H=hasPh?ribY+30:240;           // grow the canvas only to fit that track
  const Y=v=>padT+plotH-(v/max)*plotH;
  const Xs=sec=>padL+(Math.max(0,Math.min(axisMax,sec))/axisMax)*plotW;
  // Each curve point i sits at i/(n-1) of its OWN fight length (seconds), placed on the shared axis —
  // so the side that finished sooner reaches the right edge sooner and its line stops there.
  const lineFor=(a,dur)=>a.map((v,i)=>(i?"L":"M")+Xs(i/(n-1)*dur).toFixed(1)+","+Y(v).toFixed(1)).join(" ");
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;height:auto;max-width:100%">`;
  for(let g=0;g<=4;g++){const yy=axisY-(g/4)*plotH;
    s+=`<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${W-padR}" y2="${yy.toFixed(1)}" stroke="${GRID}"/>`+
       `<text x="${padL-6}" y="${(yy+3.5).toFixed(1)}" fill="${MUT}" font-size="11" text-anchor="end">${fmtR(max*g/4)}</text>`;}
  for(let g=0;g<=4;g++){const sec=axisMax*g/4, xx=Xs(sec);s+=`<text x="${xx.toFixed(1)}" y="${axisY+31}" fill="${MUT}" font-size="11" text-anchor="middle">${fmtTime(sec*1000)}</text>`;}
  // Bloodlust verticals (full-height, one shared event per side). Phases are NOT drawn in the plot anymore —
  // they live in the phase track below the axis (see end of fn) so they never clutter the curves.
  const lust=(sec,c)=>sec==null?"":`<line x1="${Xs(sec).toFixed(1)}" y1="${padT}" x2="${Xs(sec).toFixed(1)}" y2="${axisY}" stroke="${c}" stroke-dasharray="4,3" opacity=".6"/><text x="${(Xs(sec)+2).toFixed(1)}" y="${padT+11}" fill="${c}" font-size="11">&#9889;</text>`;
  s+=lust(m2.lustSec,THEIR)+lust(m1.lustSec,OUR);
  // curves (theirs under ours), each ending at its own fight length
  s+=`<path d="${lineFor(t,tDur)}" fill="none" stroke="${THEIR}" stroke-width="2" opacity=".85"/>`;
  // Ghost overlay (DPS if the toggled deaths hadn't happened): a filled gap between actual ours and the
  // ghost line (the output the deaths consumed), the dashed ghost line, and the projected kill marker.
  if(gd){
    const gDur=ghost.dur||oDur;
    // Clip the ghost projection (dashed line + shaded gap) at the projected kill — a ghost curve drawn
    // past the moment the fight would already be won is meaningless. Interpolate the exact crossing so the
    // line and shading stop ON the kill marker, not at the nearest bucket. Re-clips on every toggle since
    // ghostInner re-renders with the recomputed killSec.
    const kEnd=ghost.killSec!=null?ghost.killSec:gDur;
    const clip=(arr,dur)=>{const pts=[]; for(let i=0;i<arr.length;i++){const sec=i/(arr.length-1)*dur;
      if(sec<=kEnd){pts.push([sec,arr[i]]);} else {if(i>0){const s0=(i-1)/(arr.length-1)*dur,t=(kEnd-s0)/(sec-s0);pts.push([kEnd,arr[i-1]+(arr[i]-arr[i-1])*t]);} break;}} return pts;};
    const gc2=clip(gd,gDur), bc2=clip(o,oDur);
    const gpts=gc2.map(p=>Xs(p[0]).toFixed(1)+" "+Y(p[1]).toFixed(1));
    const bpts=bc2.map(p=>Xs(p[0]).toFixed(1)+" "+Y(p[1]).toFixed(1)).reverse();
    s+=`<path d="M${gpts.join(" L")} L${bpts.join(" L")} Z" fill="${GHOST}" opacity=".13"/>`;
    s+=`<path d="${gc2.map((p,i)=>(i?"L":"M")+Xs(p[0]).toFixed(1)+","+Y(p[1]).toFixed(1)).join(" ")}" fill="none" stroke="${GHOST}" stroke-width="2" stroke-dasharray="5,4" opacity=".95"/>`;
    if(ghost.killSec!=null){const xk=Xs(ghost.killSec);
      s+=`<line x1="${xk.toFixed(1)}" y1="${padT}" x2="${xk.toFixed(1)}" y2="${axisY}" stroke="${GHOST}" stroke-dasharray="3,3"/>`+
         `<text x="${(xk+3).toFixed(1)}" y="${padT+22}" fill="${GHOST}" font-size="11">ghost kill</text>`;}
    for(const r of asArr(ghost.deaths)){const x=Xs(r.sec);
      s+=`<text x="${x.toFixed(1)}" y="${(axisY-3).toFixed(1)}" fill="${OUR}" font-size="9" text-anchor="middle" opacity=".85">−${fmtM(r.dmg)}</text>`;}
  }
  s+=`<path d="${lineFor(o,oDur)}" fill="none" stroke="${OUR}" stroke-width="2.3"/>`;
  // death markers: just below the axis — ours first, theirs a row lower
  const tri=(tSec,c,y,name)=>{const x=Xs(tSec);return `<polygon points="${(x-4).toFixed(1)},${y} ${(x+4).toFixed(1)},${y} ${x.toFixed(1)},${(y+7).toFixed(1)}" fill="${c}"><title>${esc(name)} died ${fmtTime(tSec*1000)}</title></polygon>`;};
  for(const d of asArr(m1.deaths)) s+=tri(d.tSec,OUR,axisY+2,d.name);
  for(const d of asArr(m2.deaths)) s+=tri(d.tSec,THEIR,axisY+12,d.name);
  // PHASE TRACK — a slim two-lane ribbon below the axis labels (benchmark on top, ours below), on the SAME
  // x-scale as the curves so it lines up exactly. Each lane draws that side's fight as alternating phase
  // segments (P1, P2, …); the lanes' boundaries differ because the timelines do — the honest read the
  // full-height dividers used to fake. Only rendered when a side actually has phase transitions.
  if(hasPh){
    const lane=(phs,dur,c,y,lab)=>{
      if(!dur) return "";
      const cuts=phs.map(p=>p.tSec).filter(x=>x>0&&x<dur);
      const ids=phs.filter(p=>p.tSec>0&&p.tSec<dur).map(p=>p.id);
      const bnds=[0,...cuts,dur], segIds=[1,...ids], hh=11;
      let g=`<text x="${padL-6}" y="${y+8}" fill="${c}" font-size="9" text-anchor="end" opacity=".85">${lab}</text>`;
      for(let i=0;i<bnds.length-1;i++){const x0=Xs(bnds[i]),x1=Xs(bnds[i+1]),w=x1-x0;
        g+=`<rect x="${x0.toFixed(1)}" y="${y}" width="${Math.max(0,w).toFixed(1)}" height="${hh}" fill="${c}" opacity="${i%2?0.45:0.24}"><title>Phase ${segIds[i]} — ${fmtTime(bnds[i]*1000)}</title></rect>`+
          (w>15?`<text x="${((x0+x1)/2).toFixed(1)}" y="${y+8}" fill="#e9eef6" font-size="9" text-anchor="middle">P${segIds[i]}</text>`:"");}
      g+=cuts.map(x=>`<line x1="${Xs(x).toFixed(1)}" y1="${y}" x2="${Xs(x).toFixed(1)}" y2="${y+hh}" stroke="${c}" stroke-width="1.5"/>`).join("");
      return g;
    };
    s+=lane(tPh,tDur,THEIR,ribY,"bench")+lane(oPh,oDur,OUR,ribY+14,"yours");
  }
  return s+`</svg>`;
}
// Ghost-run overlay state (per boss): whether the ghost line is shown, and which costliest DPS deaths are
// currently "revived" (counted into the ghost). Default = all revived once enabled, so the master toggle
// shows the full ghost and each per-death toggle peels one back to isolate "what did JUST this death cost?".
const ghostState={};   // encounterID -> {on:bool, revived:Set<int>}
// The ghost-run record for a boss (matched to the per-boss timeline by boss name) — null if no projectable
// DPS deaths (nobody to revive, so no overlay).
function ghostData(b){
  const all=rowsOf(DATA.deep&&DATA.deep.ghostRun&&DATA.deep.ghostRun.bosses);
  const g=all.find(x=>x.boss===b.name);

// Recompute the ghost curve + projected kill from the current toggle state. Each revived raider adds their

function computeGhost(b,g,st){

// The Raid-DPS pane body: the chart (with the ghost overlay when enabled) + the master/per-death toggles +
