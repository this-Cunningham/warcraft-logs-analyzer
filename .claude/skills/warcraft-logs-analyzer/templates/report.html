// The ranking ladder (slopegraph): your kill order left (first at top), benchmark right, mobs
// connected across; steep highlighted lines = mobs focused much earlier/later than the benchmark.
function killLadder(rows){
  rows=rowsOf(rows).filter(r=>r.both && r.ours!=null && r.theirs!=null);
  if(rows.length<2) return "";
  const ourOrder=[...rows].sort((a,b)=>(b.ours-a.ours)||a.mob.localeCompare(b.mob));
  const theirOrder=[...rows].sort((a,b)=>(b.theirs-a.theirs)||a.mob.localeCompare(b.mob));
  const orank={},trank={}; ourOrder.forEach((r,i)=>orank[r.mob]=i); theirOrder.forEach((r,i)=>trank[r.mob]=i);
  const n=rows.length, rowH=28, padT=34, padB=16, W=800, H=padT+n*rowH+padB;
  const llx=330, rlx=470, lL=338, lR=462, y=k=>padT+k*rowH+rowH/2;
  const big=r=>Math.abs(r.ours-r.theirs)>=34;
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block;font-family:inherit">`;
  s+=`<text x="${llx}" y="20" text-anchor="end" style="font-size:11px;font-weight:700;fill:var(--ours)">${esc(DATA.ours.title)} — kill first ↓</text>`;
  s+=`<text x="${rlx}" y="20" text-anchor="start" style="font-size:11px;font-weight:700;fill:var(--theirs)">${esc(DATA.theirs.title)} — kill first ↓</text>`;
  for(const r of rows){
    const ly=y(orank[r.mob]), ry=y(trank[r.mob]), b=big(r);
    s+=`<line x1="${lL}" y1="${ly}" x2="${lR}" y2="${ry}" style="stroke:${b?'var(--warn)':'var(--line)'};stroke-width:${b?2.5:1.3};stroke-opacity:${b?0.95:0.5}"/>`;
    s+=`<circle cx="${lL}" cy="${ly}" r="3" style="fill:var(--ours)"/><circle cx="${lR}" cy="${ry}" r="3" style="fill:var(--theirs)"/>`;
  }
  for(const r of ourOrder){const ly=y(orank[r.mob]),b=big(r);
    s+=`<text x="${llx-7}" y="${ly+4}" text-anchor="end" style="font-size:12px;fill:${b?'var(--warn)':'var(--txt)'};font-weight:${b?700:400}">${orank[r.mob]+1}. ${esc(r.mob)}</text>`;}
  for(const r of theirOrder){const ry=y(trank[r.mob]),b=big(r);
    s+=`<text x="${rlx+7}" y="${ry+4}" text-anchor="start" style="font-size:12px;fill:${b?'var(--warn)':'var(--txt)'};font-weight:${b?700:400}">${trank[r.mob]+1}. ${esc(r.mob)}</text>`;}
  return s+`</svg>`;
}

function killSeq(seq,other){

  const byMob=rowsOf(tr.ccByMob);
  if(!byMob.length) return `<p class="num" style="padding:8px 2px">Neither raid used hard crowd control (Polymorph, Banish, Sap, Shackle, Freezing Trap, Repentance, …) on trash.</p>`;
  let h=`<p class="srcs" style="margin:2px 0 12px">Which mobs each raid neutralizes with hard CC (Polymorph, Banish, Sap, Shackle, Freezing Trap, …), by type and how often, ours vs the benchmark — grouped per mob, most-CC'd first. <b>Descriptive, not better/worse</b> — a raid that safely AoEs trash may need little CC. A mob the benchmark CCs heavily and you don't is a caster you should be neutralizing.</p>
    <table><thead><tr><th>Mob</th><th>Crowd control</th><th>${esc(d.ours.title)}</th><th>${esc(d.theirs.title)}</th></tr></thead><tbody>`;
  let prev=null;
  for(const r of byMob){
    const mobCell = r.mob!==prev ? `<td class="pname">${esc(r.mob)}</td>` : `<td></td>`;
    prev=r.mob;
    h+=`<tr>${mobCell}<td>${esc(r.cc)}</td>
      <td class="num" style="color:var(--ours);font-weight:600">${r.ours}</td>
      <td class="num" style="color:var(--theirs);font-weight:600">${r.theirs}</td></tr>`;
  }
  return h+`</tbody></table>`;
}
// Trash sub-tabs: outer Kill Order | Crowd Control (data-ttab), and the nested Same-Pack | Pairwise
// inside Kill Order (data-ktab). Native toggle, no re-render. Both groups wired the same way.
function mountTrash(){
  const el=document.getElementById("p-trash"); if(!el) return;
  const wire=attr=>el.querySelectorAll(`.btab[data-${attr}]`).forEach(t=>t.addEventListener("click",()=>{
    const k=t.dataset[attr];
    el.querySelectorAll(`.btab[data-${attr}]`).forEach(x=>x.classList.toggle("on",x.dataset[attr]===k));
    el.querySelectorAll(`.bsub[data-${attr}]`).forEach(x=>x.classList.toggle("active",x.dataset[attr]===k));
  }));
  wire("ttab"); wire("ktab");
}
function render(){
  const d=DATA; if(!d){document.getElementById("app").innerHTML="<p>No data.</p>";return;}
  let h=`<header class="hero">
    <div class="kicker">${esc(d.zone||"Raid")} · Performance Comparison</div>
    <h1>Raid Benchmark Report</h1>
    <div class="matchup"><span class="team ours">${esc(d.ours.title)}</span><span class="vs">vs</span><span class="team theirs">${esc(d.theirs.title)}</span></div>
    <div class="sub"><span class="dot ours"></span>${esc(d.ours.title)} &nbsp; <span class="dot theirs"></span>${esc(d.theirs.title)} &nbsp;·&nbsp; ${d.summary.bossCount} shared bosses</div>
  </header>
  <div class="tabs"><div class="tab active" data-t="overview">Overview</div><div class="tab" data-t="composition">Composition</div><div class="tab" data-t="enchants">Prep</div><div class="tab" data-t="execution">Execution</div><div class="tab" data-t="bosses">Bosses</div><div class="tab" data-t="optimize">Optimize</div><div class="tab" data-t="trash">Trash</div></div>
  <div class="panel active" id="p-overview">${renderOverview(d)}</div>
  <div class="panel" id="p-composition">${renderComposition(d)}</div>
  <div class="panel" id="p-enchants">${renderEnchants(d)}</div>
  <div class="panel" id="p-execution"></div>
  <div class="panel" id="p-bosses"></div>
  <div class="panel" id="p-optimize">${renderOptimize(d)}</div>
  <div class="panel" id="p-trash">${renderTrash(d)}</div>
  <footer>Generated by warcraft-logs-analyzer · data via Warcraft Logs v2 API · parse colors are role-appropriate percentiles</footer>`;
  document.getElementById("app").innerHTML=h;
  mountExecution();
  mountBosses();
  mountOptimize();
  mountTrash();
  wrapTables(); // wrap tables in the statically-rendered panels (Overview, Composition, Prep, Trash)
  document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    document.getElementById("p-"+t.dataset.t).classList.add("active");
  }));
}
render();
</script>
</body>
