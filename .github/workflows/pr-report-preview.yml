name: PR report preview

# Posts (and keeps updated) a single sticky comment on every PR with a clickable, render-in-browser
# link to each report HTML committed under docs/. The link is pinned to the PR's head commit via
# raw.githack.com, so it is immutable (never serves a stale cached copy) and works BEFORE merge — no
# GitHub Pages config, no merge-to-main, no branch/worktree juggling.
#
# Note: raw.githack renders files from PUBLIC GitHub repos. If this repo is private, swap the preview
# host for Cloudflare Pages / Netlify (which support private repos and also give automatic PR previews).

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  preview-link:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const sha = pr.head.sha;
            // Use the HEAD repo's full name so the link works for branches in this repo (and forks).
            const headSlug = pr.head.repo.full_name;

            const dir = 'docs';
            const htmls = fs.existsSync(dir)
              ? fs.readdirSync(dir).filter(f => f.endsWith('.html') && f !== 'index.html')
              : [];

            const MARKER = '<!-- report-preview -->';
            let body;
            if (htmls.length) {
              const links = htmls
                .map(f => `- [\`${f}\`](https://raw.githack.com/${headSlug}/${sha}/docs/${f})`)
                .join('\n');
              body = `${MARKER}\n### 📊 Report preview\n${links}\n\n` +
                     `<sub>Rendered via raw.githack, pinned to commit \`${sha.slice(0, 7)}\` — ` +
                     `immutable and updates on every push. (Requires a public repo; for a private ` +
                     `repo, use Cloudflare Pages / Netlify PR previews instead.)</sub>`;
            } else {
              body = `${MARKER}\n### 📊 Report preview\n_No report HTML found under \`docs/\` in this PR. ` +
                     `Run \`python3 scripts/publish_report.py\` and push the result to get a preview link._`;
            }

            // Upsert a single sticky comment (find by hidden marker, update if present else create).
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: pr.number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(MARKER));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: pr.number, body });
            }
