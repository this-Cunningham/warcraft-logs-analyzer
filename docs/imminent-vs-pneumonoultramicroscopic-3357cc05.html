// Bloodlust timing + window payoff (EXPERIMENTAL): per boss, WHEN each raid popped lust and the DPS
// multiplier in the 40s window after — did the burst actually align with the haste window?
function bloodlustView(d){
  const rows=rowsOf(d.deep&&d.deep.bloodlust&&d.deep.bloodlust.rows);
  if(!rows.length) return "";
  const tsec=s=>s==null?"—":fmtTime(s*1000);          // seconds-into-fight → m:ss
  const cdp=p=>p==null?"—":(p+"%");
  const mult=m=>m==null?"—":("×"+m);
  // One synthesized read per boss — did the burst actually land in the haste window? Combines ALIGNMENT
  // (share of major cooldowns that fired during lust — the fixable habit) with PAYOFF (raid DPS in the
  // 40s window ÷ fight average — >1× = the stacking paid off). The two supporting numbers stay as evidence
  // beneath the verdict; timing is muted context (on-pull vs saved-for-a-phase is strategy, not a target).
  function verdict(cd,m){
    if(cd==null||m==null) return {cls:"flat",txt:"—"};
    if(cd>=80&&m>=1.2) return {cls:"good",txt:"Burst landed"};
    if(cd<60) return {cls:"bad",txt:"CDs spent off-window"};
    if(m<1.05) return {cls:"bad",txt:"Window underused"};
    return {cls:"warn",txt:"Partial — tighten it"};
  }
  let h=`<h2 class="section">Bloodlust — Are You Stacking Burst Into It?<span class="xp">Experimental</span><span class="hint">Per boss: <b>did your burst land in the Bloodlust window?</b> Combines <b>CD alignment</b> (share of cooldowns fired during lust — low = the fixable habit) with <b>payoff</b> (raid DPS in the window ÷ fight average; &gt;1× = paid off). <b>Lust timing</b> is context — on-pull vs saved-for-a-phase is strategy, not a target. <b>Experimental.</b></span></h2>
  <table><thead><tr><th>Boss</th><th>Did burst land?</th><th>CD alignment<br>you vs bench</th><th>Payoff<br>you vs bench</th><th class="role">lust at (you / bench)</th></tr></thead><tbody>`;
  for(const r of rows){
    const v=verdict(r.oursCdPct,r.oursMult);
    const cdl=(r.oursCdPct!=null&&r.theirsCdPct!=null)?deltaHigh(r.oursCdPct,r.theirsCdPct):null;
    const dl=(r.oursMult!=null&&r.theirsMult!=null)?deltaHigh(r.oursMult,r.theirsMult):null;
    h+=`<tr><td style="font-weight:600">${esc(r.boss)}</td>
      <td><span class="delta ${v.cls}" style="font-size:12px">${v.txt}</span></td>
      <td class="num"><span style="color:var(--ours);font-weight:600">${cdp(r.oursCdPct)}</span> <span style="opacity:.55">vs ${cdp(r.theirsCdPct)}</span>${cdl?` <span class="delta ${cdl.cls}">${cdl.txt}</span>`:""}</td>
      <td class="num"><span style="color:var(--ours);font-weight:600">${mult(r.oursMult)}</span> <span style="opacity:.55">vs ${mult(r.theirsMult)}</span>${dl?` <span class="delta ${dl.cls}">${dl.txt}</span>`:""}</td>
      <td class="num role"><span style="color:var(--ours)">${tsec(r.oursSec)}</span> <span style="opacity:.55">/ ${tsec(r.theirsSec)}</span></td></tr>`;
  }
  return h+`</tbody></table>`;
}

// Per-boss DPS/HPS over time, ours vs benchmark, on a shared ABSOLUTE-seconds x-axis. Two kills of
// different length line up in real time, so the shorter kill's line simply ends earlier — the read is
// both "where in the fight does the gap open?" and "how much sooner did the benchmark finish?". Curves
// are exact (event-binned upstream), not WCL's smoothed graph, so they agree with Raid DPS elsewhere.
function tlChart(o,t,m1,m2,ghost){
  const OUR="#4ea1ff",THEIR="#ff7a59",GRID="#262f40",MUT="#8a96aa",GHOST="#36d399";
  const W=1000,padL=48,padR=14,padT=16, plotW=W-padL-padR, plotH=184, axisY=padT+plotH; // plot fixed; axisY=200
  o=asArr(o).map(Number); t=asArr(t).map(Number);
  const gd=ghost&&ghost.dps?asArr(ghost.dps).map(Number):null;
  const n=Math.max(o.length,t.length); if(n<2) return "";
  const max=Math.max(1,...o,...t,...(gd||[]))*1.08;
  const oDur=m1.durSec||0, tDur=m2.durSec||0, axisMax=Math.max(oDur,tDur,1); // seconds
  const oPh=asArr(m1.phases), tPh=asArr(m2.phases), hasPh=!!(oPh.length||tPh.length);
  const ribY=axisY+38;                 // phase track sits BELOW the x-axis time labels, only when phases exist
  const H=hasPh?ribY+30:240;           // grow the canvas only to fit that track
  const Y=v=>padT+plotH-(v/max)*plotH;
  const Xs=sec=>padL+(Math.max(0,Math.min(axisMax,sec))/axisMax)*plotW;
  // Each curve point i sits at i/(n-1) of its OWN fight length (seconds), placed on the shared axis —
  // so the side that finished sooner reaches the right edge sooner and its line stops there.
  const lineFor=(a,dur)=>a.map((v,i)=>(i?"L":"M")+Xs(i/(n-1)*dur).toFixed(1)+","+Y(v).toFixed(1)).join(" ");
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;height:auto;max-width:100%">`;
  for(let g=0;g<=4;g++){const yy=axisY-(g/4)*plotH;
    s+=`<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${W-padR}" y2="${yy.toFixed(1)}" stroke="${GRID}"/>`+
       `<text x="${padL-6}" y="${(yy+3.5).toFixed(1)}" fill="${MUT}" font-size="11" text-anchor="end">${fmtR(max*g/4)}</text>`;}
  for(let g=0;g<=4;g++){const sec=axisMax*g/4, xx=Xs(sec);s+=`<text x="${xx.toFixed(1)}" y="${axisY+31}" fill="${MUT}" font-size="11" text-anchor="middle">${fmtTime(sec*1000)}</text>`;}
  // Bloodlust verticals (full-height, one shared event per side). Phases are NOT drawn in the plot anymore —
  // they live in the phase track below the axis (see end of fn) so they never clutter the curves.
  const lust=(sec,c)=>sec==null?"":`<line x1="${Xs(sec).toFixed(1)}" y1="${padT}" x2="${Xs(sec).toFixed(1)}" y2="${axisY}" stroke="${c}" stroke-dasharray="4,3" opacity=".6"/><text x="${(Xs(sec)+2).toFixed(1)}" y="${padT+11}" fill="${c}" font-size="11">&#9889;</text>`;
  s+=lust(m2.lustSec,THEIR)+lust(m1.lustSec,OUR);
  // curves (theirs under ours), each ending at its own fight length
  s+=`<path d="${lineFor(t,tDur)}" fill="none" stroke="${THEIR}" stroke-width="2" opacity=".85"/>`;
  // Ghost overlay (DPS if the toggled deaths hadn't happened): a filled gap between actual ours and the
  // ghost line (the output the deaths consumed), the dashed ghost line, and the projected kill marker.
  if(gd){
    const gDur=ghost.dur||oDur;
    // Clip the ghost projection (dashed line + shaded gap) at the projected kill — a ghost curve drawn
    // past the moment the fight would already be won is meaningless. Interpolate the exact crossing so the
    // line and shading stop ON the kill marker, not at the nearest bucket. Re-clips on every toggle since
    // ghostInner re-renders with the recomputed killSec.
    const kEnd=ghost.killSec!=null?ghost.killSec:gDur;
    const clip=(arr,dur)=>{const pts=[]; for(let i=0;i<arr.length;i++){const sec=i/(arr.length-1)*dur;
      if(sec<=kEnd){pts.push([sec,arr[i]]);} else {if(i>0){const s0=(i-1)/(arr.length-1)*dur,t=(kEnd-s0)/(sec-s0);pts.push([kEnd,arr[i-1]+(arr[i]-arr[i-1])*t]);} break;}} return pts;};
    const gc2=clip(gd,gDur), bc2=clip(o,oDur);
    const gpts=gc2.map(p=>Xs(p[0]).toFixed(1)+" "+Y(p[1]).toFixed(1));
    const bpts=bc2.map(p=>Xs(p[0]).toFixed(1)+" "+Y(p[1]).toFixed(1)).reverse();
    s+=`<path d="M${gpts.join(" L")} L${bpts.join(" L")} Z" fill="${GHOST}" opacity=".13"/>`;

          (w>15?`<text x="${((x0+x1)/2).toFixed(1)}" y="${y+8}" fill="#e9eef6" font-size="9" text-anchor="middle">P${segIds[i]}</text>`:"");}

// Ghost-run overlay state (per boss): whether the ghost line is shown, and which costliest DPS deaths are
// currently "revived" (counted into the ghost). Default = all revived once enabled, so the master toggle
// shows the full ghost and each per-death toggle peels one back to isolate "what did JUST this death cost?".
const ghostState={};   // encounterID -> {on:bool, revived:Set<int>}
// The ghost-run record for a boss (matched to the per-boss timeline by boss name) — null if no projectable
// DPS deaths (nobody to revive, so no overlay).
function ghostData(b){
  const all=rowsOf(DATA.deep&&DATA.deep.ghostRun&&DATA.deep.ghostRun.bosses);
  const g=all.find(x=>x.boss===b.name);
  return (g&&rowsOf(g.raiders).length&&b.timeline&&b.timeline.ours&&b.timeline.ours.durSec>0)?g:null;
}
function ghostInit(enc,g){
  if(!ghostState[enc]) ghostState[enc]={on:false,revived:new Set(rowsOf(g.raiders).map((_,i)=>i))};
  return ghostState[enc];
}
// Recompute the ghost curve + projected kill from the current toggle state. Each revived raider adds their
// night-average DPS (`rate`) to every timeline bucket from their death to the kill; the projected kill is
// where the ghost curve's cumulative damage reaches the actual total (a pure DPS-race upper bound).
function computeGhost(b,g,st){
  const tl=b.timeline, dps=asArr(tl.ours.dps).map(Number), n=dps.length, dur=tl.ours.durSec||0;
  const bucket=dur/Math.max(1,n), ghost=dps.slice(), raiders=rowsOf(g.raiders);
  raiders.forEach((r,i)=>{ if(st.revived.has(i)) for(let k=0;k<n;k++) if((k+1)*bucket>r.sec) ghost[k]+=r.rate; });
  const Dneed=dps.reduce((a,v)=>a+v*bucket,0);

// The Raid-DPS pane body: the chart (with the ghost overlay when enabled) + the master/per-death toggles +

// Raid spread-over-time curve: the squishy-cohort spread radius (yd) across the fight, ours vs benchmark, on
// the SAME absolute-seconds axis as the DPS curves above — so a spike (the raid scattering, often a mechanic)
// lines up with where DPS dipped. Null buckets (too few actors sampled) break the line into segments rather
// than drawing through a gap. Frame-independent metric (within-raid spacing), so it's valid on every boss.
function spreadChart(o,t,m1,m2){

  const W=1000,padL=48,padR=14,padT=16,plotW=W-padL-padR,plotH=140,axisY=padT+plotH;
  o=asArr(o); t=asArr(t);
  const nums=[...o,...t].filter(v=>v!=null).map(Number);
  if(nums.length<2) return "";
  const max=Math.max(1,...nums)*1.12;
  const oDur=m1.durSec||0, tDur=m2.durSec||0, axisMax=Math.max(oDur,tDur,1);
  const H=axisY+40;
  const Y=v=>padT+plotH-(v/max)*plotH;
  const Xs=sec=>padL+(Math.max(0,Math.min(axisMax,sec))/axisMax)*plotW;
  const pathFor=(a,dur)=>{const n=a.length; let d="",pen=false;
    for(let i=0;i<n;i++){const v=a[i]; if(v==null){pen=false;continue;}
      const x=Xs(n>1?i/(n-1)*dur:0), y=Y(Number(v));
      d+=(pen?" L":" M")+x.toFixed(1)+","+y.toFixed(1); pen=true;}
    return d.trim();};
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;height:auto;max-width:100%">`;
  for(let g=0;g<=4;g++){const yy=axisY-(g/4)*plotH;
    s+=`<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${W-padR}" y2="${yy.toFixed(1)}" stroke="${GRID}"/>`+
       `<text x="${padL-6}" y="${(yy+3.5).toFixed(1)}" fill="${MUT}" font-size="11" text-anchor="end">${Math.round(max*g/4)}yd</text>`;}
  for(let g=0;g<=4;g++){const sec=axisMax*g/4, xx=Xs(sec);s+=`<text x="${xx.toFixed(1)}" y="${axisY+31}" fill="${MUT}" font-size="11" text-anchor="middle">${fmtTime(sec*1000)}</text>`;}
  s+=`<path d="${pathFor(t,tDur)}" fill="none" stroke="${THEIR}" stroke-width="2" opacity=".85"/>`;
  s+=`<path d="${pathFor(o,oDur)}" fill="none" stroke="${OUR}" stroke-width="2.3"/>`;
  return s+`</svg>`;
}
function spreadView(b){

    ${chart}`;
}
function timelineChart(b){

// One reusable mirrored-bar grid (the report's horizontal ours←|→theirs idiom), so the layout lives in
// ONE place instead of 11 hand-rolled copies. No side value columns: the signed difference WITH units sits
// under the name in the centre, and the bars take the freed width. opts:
//   label, oTitle, tTitle  — header (titles default to the loaded raids)
//   ours(r), theirs(r)     — numeric values driving bar widths (and the default max)
//   name(r)                — centre label html (the row's name + any inline bits)
//   delta(r) -> {cls,txt}  — signed diff with units, shown under the name (optional)
//   ctx(r)   -> html       — right-hand context cell; presence adds the ctx column (optional)
//   sub(r)   -> html       — full-width sub-rows appended beneath the row (optional)
//   group(r) -> key, groupLabel(r) -> html — a centred full-width separator when the key changes (optional)
//   max                    — explicit bar max (optional; else max over all ours/theirs)

function mirrorGrid(rows, o){

function statStrip(b){

function topSources(b){

// Buff/debuff uptime, laid out like the damage-taken comparison (ours ← name → theirs)

function uptimeCompare(rows,label){

  rows.sort((a,b)=>(a.o-a.t)-(b.o-b.t)); // most negative delta (we trail most) first

    ours:r=>r.o, theirs:r=>r.t, name:r=>esc(r.name),

// The damage-taken toggle lives on Execution (Output Quality) but also drives the per-boss damage

// Wrap every data table in a horizontal scroll box so a table wider than the screen scrolls inside

function optBossBody(d,cls,s,b){

    return `<p class="num" style="padding:6px 2px">No ${fac} world ranking found for ${esc(s.spec)} ${esc(cls)} on ${esc(b.name||"this boss")} — nothing to benchmark against.</p>`;
  }

  const guild=bm.guild?` · ${esc(bm.guild)}`:"", reg=bm.region?` (${esc(bm.region)})`:"";

  const players=rowsOf(b.players);
  if(!players.length) return h+`<p class="num" style="padding:6px 2px">None of your ${esc(s.spec)} ${esc(cls)} raiders played that role/form on ${esc(b.name||"this boss")} — nobody to compare like-for-like (e.g. a Feral who tanked in bear isn't matched to a cat-DPS best).</p>`;
  const parseTag=p=>p.parse!=null?` <span class="parse" style="background:${parseColor(p.parse)}">${p.parse}</span>`:"";
  const match=players.filter(p=>p.matches), diverge=players.filter(p=>!p.matches);
  if(match.length){
    h+=`<div class="complist" style="margin:0 0 14px">`+match.map(p=>`<span class="chip" style="border-color:var(--good)"><span style="color:${col};font-weight:600">${esc(p.name)}</span>${parseTag(p)} <span style="color:#9be7b4">· matches world best ✓</span></span>`).join("")+`</div>`;
  }

        ours:a=>a.ours, theirs:a=>a.theirs, name:a=>esc(a.name),

}

// The ranking ladder (slopegraph): your kill order left (first at top), benchmark right, mobs
// connected across; steep highlighted lines = mobs focused much earlier/later than the benchmark.
function killLadder(rows){
  rows=rowsOf(rows).filter(r=>r.both && r.ours!=null && r.theirs!=null);
  if(rows.length<2) return "";
  const ourOrder=[...rows].sort((a,b)=>(b.ours-a.ours)||a.mob.localeCompare(b.mob));
  const theirOrder=[...rows].sort((a,b)=>(b.theirs-a.theirs)||a.mob.localeCompare(b.mob));
  const orank={},trank={}; ourOrder.forEach((r,i)=>orank[r.mob]=i); theirOrder.forEach((r,i)=>trank[r.mob]=i);
  const n=rows.length, rowH=28, padT=34, padB=16, W=800, H=padT+n*rowH+padB;
  const llx=330, rlx=470, lL=338, lR=462, y=k=>padT+k*rowH+rowH/2;

  s+=`<text x="${llx}" y="20" text-anchor="end" style="font-size:11px;font-weight:700;fill:var(--ours)">${esc(DATA.ours.title)} — kill first ↓</text>`;
  s+=`<text x="${rlx}" y="20" text-anchor="start" style="font-size:11px;font-weight:700;fill:var(--theirs)">${esc(DATA.theirs.title)} — kill first ↓</text>`;
  for(const r of rows){
    const ly=y(orank[r.mob]), ry=y(trank[r.mob]), b=big(r);
    s+=`<line x1="${lL}" y1="${ly}" x2="${lR}" y2="${ry}" style="stroke:${b?'var(--warn)':'var(--line)'};stroke-width:${b?2.5:1.3};stroke-opacity:${b?0.95:0.5}"/>`;
    s+=`<circle cx="${lL}" cy="${ly}" r="3" style="fill:var(--ours)"/><circle cx="${lR}" cy="${ry}" r="3" style="fill:var(--theirs)"/>`;
  }
  for(const r of ourOrder){const ly=y(orank[r.mob]),b=big(r);
    s+=`<text x="${llx-7}" y="${ly+4}" text-anchor="end" style="font-size:12px;fill:${b?'var(--warn)':'var(--txt)'};font-weight:${b?700:400}">${orank[r.mob]+1}. ${esc(r.mob)}</text>`;}
  for(const r of theirOrder){const ry=y(trank[r.mob]),b=big(r);
    s+=`<text x="${rlx+7}" y="${ry+4}" text-anchor="start" style="font-size:12px;fill:${b?'var(--warn)':'var(--txt)'};font-weight:${b?700:400}">${trank[r.mob]+1}. ${esc(r.mob)}</text>`;}
  return s+`</svg>`;
}
// One kill-order sequence as chips with arrows; a mob in a different slot than the other side is flagged.
function killSeq(seq,other){
  seq=asArr(seq); const orank={}; asArr(other).forEach((m,i)=>orank[m]=i);
  return seq.map((m,i)=>{
    const o=orank[m];
    const div=(o==null)||o!==i; // different position (or absent) than the other raid's order
    return `<span class="tkmob${div?' div':''}">${esc(m)}</span>`;
  }).join('<span class="tkarrow">→</span>');
}
// Crowd control on trash — DESCRIPTIVE (more isn't better; the benchmark sets the bar). Only the
// by-mob breakdown is shown: it's the actionable view (which caster to CC). The old overall by-type
// summary table was cut — its totals are implied by the per-mob rows and added no signal a leader acts on.
function trashCcView(tr,d){
  const byMob=rowsOf(tr.ccByMob);
  if(!byMob.length) return `<p class="num" style="padding:8px 2px">Neither raid used hard crowd control (Polymorph, Banish, Sap, Shackle, Freezing Trap, Repentance, …) on trash.</p>`;
  let h=`<p class="srcs" style="margin:2px 0 12px">Which mobs each raid neutralizes with hard CC (Polymorph, Banish, Sap, Shackle, Freezing Trap, …), by type and how often, ours vs the benchmark — grouped per mob, most-CC'd first. <b>Descriptive, not better/worse</b> — a raid that safely AoEs trash may need little CC. A mob the benchmark CCs heavily and you don't is a caster you should be neutralizing.</p>
    <table><thead><tr><th>Mob</th><th>Crowd control</th><th>${esc(d.ours.title)}</th><th>${esc(d.theirs.title)}</th></tr></thead><tbody>`;
  let prev=null;
  for(const r of byMob){
    const mobCell = r.mob!==prev ? `<td class="pname">${esc(r.mob)}</td>` : `<td></td>`;
    prev=r.mob;
    h+=`<tr>${mobCell}<td>${esc(r.cc)}</td>
      <td class="num" style="color:var(--ours);font-weight:600">${r.ours}</td>
      <td class="num" style="color:var(--theirs);font-weight:600">${r.theirs}</td></tr>`;
  }
  return h+`</tbody></table>`;
}
// Trash sub-tabs: outer Kill Order | Crowd Control (data-ttab), and the nested Same-Pack | Pairwise
// inside Kill Order (data-ktab). Native toggle, no re-render. Both groups wired the same way.
function mountTrash(){
  const el=document.getElementById("p-trash"); if(!el) return;
  const wire=attr=>el.querySelectorAll(`.btab[data-${attr}]`).forEach(t=>t.addEventListener("click",()=>{
    const k=t.dataset[attr];
    el.querySelectorAll(`.btab[data-${attr}]`).forEach(x=>x.classList.toggle("on",x.dataset[attr]===k));
    el.querySelectorAll(`.bsub[data-${attr}]`).forEach(x=>x.classList.toggle("active",x.dataset[attr]===k));
  }));
  wire("ttab"); wire("ktab");
}
/* ---------- WIPES (per-boss progression: the wall, the trend, the tax, what ends attempts) ---------- */
function renderWipes(d){
  const dp=d.deep, w=dp&&dp.wipes&&dp.wipes.ours;
  if(!w||!w.present||!rowsOf(w.bosses).length){
    return `<h2 class="section">Wipes</h2><p class="num" style="padding:8px 2px">No wipes recorded on the shared bosses — a clean clear. (This tab fills in on progression nights: it reads every pull's depth, phase, the time the wiping cost, and what ended each attempt.)</p>`;
  }
  const tW=(dp.wipes.theirs&&dp.wipes.theirs.present)?dp.wipes.theirs:null;
  const tByEnc={}; if(tW) for(const b of rowsOf(tW.bosses)) tByEnc[b.encounterID]=b;
  const mmss=s=>{s=Math.round(s);return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");};
  const pct=p=>p==null?"—":(p<1?"<1%":(Math.round(p*10)/10)+"%");
  let h=`<h2 class="section">Wipes — Progression Breakdown<span class="xp">Experimental</span><span class="hint">A deep read of every wipe on the shared bosses: how far attempts got (the <b>wall</b>), whether they're <b>converging</b> on a kill, the <b>time</b> wiping cost, and <b>what ends attempts</b> (first death and killing blows). First-party — the benchmark is on farm, so this is about <i>your</i> progression. <b>Experimental.</b></span></h2>`;
  h+=`<div class="cards">
    <div class="card"><div class="label">Wipes (shared bosses)</div><div class="vals"><span class="v ours">${w.totalWipes}</span>${tW?`<span class="v theirs">${tW.totalWipes}</span>`:""}</div></div>
    <div class="card"><div class="label">Time Spent Wiping</div><div class="vals"><span class="v ours">${mmss(w.totalWipeTimeSec)}</span>${tW?`<span class="v theirs">${mmss(tW.totalWipeTimeSec)}</span>`:""}</div></div>
    ${w.biggestSink?`<div class="card"><div class="label">Biggest Time Sink</div><div class="vals"><span class="v ours" style="font-size:17px">${esc(w.biggestSink)}</span></div></div>`:""}
  </div>`;
  for(const b of rowsOf(w.bosses)){
    const tb=tByEnc[b.encounterID];
    h+=`<div class="boss" style="margin-top:18px"><h3>${esc(b.name)}<span class="badge" style="background:${b.downed?'#16351f':'#3a1717'};color:${b.downed?'var(--good)':'var(--bad)'}">${b.downed?'downed ✓':'not downed'}</span></h3>
      <div class="cards">
        <div class="card"><div class="label">Wipes</div><div class="vals"><span class="v ours">${b.wipes}</span>${tb?`<span class="v theirs">${tb.wipes}</span>`:""}</div></div>
        <div class="card"><div class="label">Closest Attempt</div><div class="vals"><span class="v ours">${pct(b.bestPct)}${b.bestPhase?` <span class="num" style="font-size:12px">(${esc(b.bestPhase)})</span>`:""}</span></div></div>
        <div class="card"><div class="label">Time Wiping</div><div class="vals"><span class="v ours">${mmss(b.wipeTimeSec)}</span></div></div>
      </div>`;
    if(b.wall&&b.wall.phase){
      h+=`<p class="srcs" style="margin:10px 0 4px"><b>The wall:</b> ${b.wall.wipes} of ${b.wall.ofTotal} wipe${b.wall.ofTotal!==1?"s":""} ended in <b style="color:var(--ours)">${esc(b.wall.phase)}</b>${b.wall.medPct!=null?` around <b>${pct(b.wall.medPct)}</b> boss HP`:""} — the phase to drill.</p>`;
    }
    if(b.trend){
      const seq=asArr(b.trendSeq).filter(v=>v!=null);
      const viz=seq.length?`<div style="display:flex;align-items:flex-end;gap:3px;height:48px;margin:6px 0 2px">`+seq.map((v,i)=>{const prog=Math.max(0,100-v);return `<span title="Wipe ${i+1}: ${pct(v)} boss HP remaining" style="width:10px;display:inline-block;border-radius:2px 2px 0 0;background:var(--ours);height:${Math.max(4,Math.round(prog/100*44))}px"></span>`;}).join("")+`</div><div class="num" style="font-size:11px;opacity:.6">each bar = a wipe in order · taller = closer to the kill</div>`:"";
      h+=`<p class="srcs" style="margin:8px 0 2px"><b>Trend:</b> ${esc(b.trend)}</p>${viz}`;
    }
    if(b.deathsTracked&&rowsOf(b.firstDeaths).length){
      const top=rowsOf(b.firstDeaths)[0];
      h+=`<p class="srcs" style="margin:12px 0 4px"><b>What ends your attempts:</b> the first death was most often <b style="color:var(--bad)">${esc(top.cause)}</b>${top.count>1?` (${top.count}× across ${b.deathsTracked} tracked wipes)`:""} — the failure that starts the cascade.</p>`;
      // Disambiguation: is this a mechanics/positioning wall, or a sustained-damage (healing/gear) wall?
      const m=b.causeMechanic||0, s=b.causeSustained||0, tot=m+s;
      if(tot){
        const mechs=rowsOf(b.topMechanics).slice(0,3).map(x=>esc(x.cause)).join(", ");
        let verdict;
        if(m>=2*s&&m>0) verdict=`a <b style="color:var(--bad)">mechanics problem</b> — ${m}/${tot} deaths to avoidable hits (${mechs}). Drill positioning/timing on those; <b>healing won't fix it</b> (you can't out-heal those hits).`;
        else if(s>=2*m&&s>0) verdict=`a <b style="color:var(--bad)">sustained-damage problem</b> — ${s}/${tot} deaths to melee/attrition, not single mechanics. That's a <b>healing-assignment / defensive / gear / tuning</b> question, not a positioning drill.`;
        else verdict=`<b>mixed</b> — ${m}/${tot} to avoidable mechanics (${mechs}), ${s}/${tot} to sustained damage. Split the fix: positioning for the first, healing/CDs for the second.`;
        h+=`<p class="srcs" style="margin:4px 0 4px"><b>Likely cause:</b> ${verdict} <span class="num" style="opacity:.6">— heuristic from the death-window damage mix; it can't see a missed defensive, and "avoidable" = a death window dominated by named, non-melee damage.</span></p>`;
      }
      const kb=rowsOf(b.killingBlows);
      if(kb.length){
        h+=`<table><thead><tr><th>Killing blow on wipes</th><th>Deaths</th></tr></thead><tbody>`;
        for(const r of kb) h+=`<tr><td style="font-weight:600">${esc(r.cause)}</td><td class="num">${r.count}</td></tr>`;
        h+=`</tbody></table>`;
      }
    } else if(!w.hasDeaths){
      h+=`<p class="srcs" style="margin:8px 0 0;opacity:.7">Per-wipe death detail (what ends the attempts) appears after the next data refresh — it draws on a newly added fetch.</p>`;
    }
    h+=`</div>`;
  }
  /* Wipe Recovery (EXPERIMENTAL) — reset/rebuff/re-pull pace between a wipe and the next pull. Moved here
     from Execution in the /audit pass: it's wipe-pacing, so it belongs on the Wipes tab. */
  h+=wipeRecoveryView(d);
  return h;
}
function render(){
  const d=DATA; if(!d){document.getElementById("app").innerHTML="<p>No data.</p>";return;}
  let h=`<header class="hero">
    <div class="kicker">${esc(d.zone||"Raid")} · Performance Comparison</div>
    <h1>Raid Benchmark Report</h1>
    <div class="matchup"><span class="team ours">${esc(d.ours.title)}</span><span class="vs">vs</span><span class="team theirs">${esc(d.theirs.title)}</span></div>
    <div class="sub"><span class="dot ours"></span>${esc(d.ours.title)} &nbsp; <span class="dot theirs"></span>${esc(d.theirs.title)} &nbsp;·&nbsp; ${d.summary.bossCount} shared bosses</div>
  </header>
  <div class="tabs"><div class="tab active" data-t="overview">Overview</div><div class="tab" data-t="composition">Composition</div><div class="tab" data-t="enchants">Prep</div><div class="tab" data-t="execution">Execution</div><div class="tab" data-t="bosses">Bosses</div><div class="tab" data-t="wipes">Wipes</div><div class="tab" data-t="optimize">Optimize</div><div class="tab" data-t="trash">Trash</div></div>
  <div class="panel active" id="p-overview">${renderOverview(d)}</div>
  <div class="panel" id="p-composition">${renderComposition(d)}</div>
  <div class="panel" id="p-enchants">${renderEnchants(d)}</div>
  <div class="panel" id="p-execution"></div>
  <div class="panel" id="p-bosses"></div>
  <div class="panel" id="p-wipes">${renderWipes(d)}</div>
  <div class="panel" id="p-optimize">${renderOptimize(d)}</div>
  <div class="panel" id="p-trash">${renderTrash(d)}</div>
  <footer>Generated by warcraft-logs-analyzer · data via Warcraft Logs v2 API · parse colors are role-appropriate percentiles</footer>`;
  document.getElementById("app").innerHTML=h;
  mountExecution();
  mountBosses();
  mountOptimize();
  mountTrash();
  wrapTables(); // wrap tables in the statically-rendered panels (Overview, Composition, Prep, Trash)
  document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    document.getElementById("p-"+t.dataset.t).classList.add("active");
  }));
}
render();
</script>
