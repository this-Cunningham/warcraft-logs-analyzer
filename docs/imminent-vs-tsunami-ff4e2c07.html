// The damage-taken toggle lives on Execution (Output Quality) but also drives the per-boss damage
// breakdowns on the Bosses tab, so flipping it re-renders BOTH panels.
// Wrap every data table in a horizontal scroll box so a table wider than the screen scrolls inside
// itself instead of widening the whole page — on mobile a page-wide table leaks into a sideways scroll
// of the entire page (nav bar included). Idempotent: skips tables already inside a scroll wrapper.
function wrapTables(root){
  (root||document).querySelectorAll("table").forEach(t=>{
    if(t.closest(".cmwrap,.ladder,.tscroll")) return;
    const w=document.createElement("div"); w.className="tscroll";
    t.parentNode.insertBefore(w,t); w.appendChild(t);
  });
}

const optMetricLbl=m=>m==="hps"?"HPS":"DPS";

// each of our raiders' cast-mix table (or a green "matches world best" chip when within 5 points on every

function optBossBody(d,cls,s,b){
  const col=cc(cls), fac=esc((d.deep.optimize&&d.deep.optimize.factionName)||"same-faction");
  const bm=b.benchmark;
  if(!bm||!bm.name){
    return `<p class="num" style="padding:6px 2px">No ${fac} world ranking found for ${esc(s.spec)} ${esc(cls)} on ${esc(b.name||"this boss")} — nothing to benchmark against.</p>`;
  }
  const amt=bm.amount!=null?` · ${fmtR(bm.amount)} ${optMetricLbl(bm.metric)}`:"";
  const guild=bm.guild?` · ${esc(bm.guild)}`:"", reg=bm.region?` (${esc(bm.region)})`:"";
  let h=`<div class="optbench"><span class="optlabel">Benchmark</span><b style="color:${col}">${esc(bm.name)}</b>${guild}${reg} — World #${bm.globalRank} ${fac} ${esc(s.spec)} ${esc(cls)} on <b>${esc(b.name||"")}</b>${amt}</div>`;
  const players=rowsOf(b.players);
  if(!players.length) return h+`<p class="num" style="padding:6px 2px">None of your ${esc(s.spec)} ${esc(cls)} raiders played that role/form on ${esc(b.name||"this boss")} — nobody to compare like-for-like (e.g. a Feral who tanked in bear isn't matched to a cat-DPS best).</p>`;
  const parseTag=p=>p.parse!=null?` <span class="parse" style="background:${parseColor(p.parse)}">${p.parse}</span>`:"";
  const match=players.filter(p=>p.matches), diverge=players.filter(p=>!p.matches);
  if(match.length){
    h+=`<div class="complist" style="margin:0 0 14px">`+match.map(p=>`<span class="chip" style="border-color:var(--good)"><span style="color:${col};font-weight:600">${esc(p.name)}</span>${parseTag(p)} <span style="color:#9be7b4">· matches world best ✓</span></span>`).join("")+`</div>`;
  }

    h+=`<div style="margin:0 0 18px"><div class="optpname"><span style="color:${col}">${esc(p.name)}</span>${parseTag(p)}</div>
      ${hitNote}
      <div class="dmgcmp"><div class="dmgcmphdr2"><span class="cours">${esc(p.name)}</span><span>Cast share by ability</span><span class="cthe">${esc(bm.name)}</span></div><div class="ugrid">`;

        <div class="dbarL"><div class="f ours" style="width:${w(a.ours)}%"></div></div>

        <div class="dbarR"><div class="f theirs" style="width:${w(a.theirs)}%"></div></div>
        <div class="dval ro">${a.theirs}%</div>`;
    }
    h+=`</div></div></div>`;
  }

}

  const go=tr.glance.ours, gt=tr.glance.theirs;

  let h=`<h2 class="section">Trash at a Glance<span class="hint">Trash pulls, time, and deaths, ours vs the benchmark.${zoneNote} Routes and skips still differ, so clear time is a rough proxy — deaths are the clean signal. Lower is better for time and deaths.</span></h2>
  <div class="cards">

  </div>`;

  /* What's killing us on trash — same idea as the boss view, scoped to trash. Each named killing

  if(dc.length){
    h+=`<h2 class="section">What's Killing Us on Trash<span class="hint">Player deaths on trash by killing blow, across every pull, ours vs the benchmark. The mob in parens landed the blow — CC, kite, or position around it. A cause the benchmark takes 0 of is a mechanic to solve. "Melee" is broken out by mob below. Lower is better.</span></h2>
    <table><thead><tr><th>Killing blow (mob)</th><th>${esc(d.ours.title)}</th><th>${esc(d.theirs.title)}</th><th>Δ</th></tr></thead><tbody>`;
    for(const r of dc){
      const dl=deltaLow(r.ours,r.theirs);
      h+=`<tr><td style="font-weight:600">${esc(r.cause)}</td>

        <td class="num" style="color:var(--theirs);font-weight:600">${r.theirs}</td>
        <td class="delta ${dl.cls}">${dl.txt}</td></tr>`;
    }
    h+=`</tbody></table>`;
    /* Melee deaths broken out by which mob's melee did the killing — a bare "Melee" is opaque; the
       mob points straight at a CC / kite / tank-positioning fix. */
    const mm=rowsOf(tr.meleeByMob);
    if(mm.length){
      h+=`<h4 style="margin:16px 0 6px">Melee deaths — by mob<span class="role" style="text-transform:none;letter-spacing:0;font-weight:400"> — which mobs' melee are doing the killing</span></h4>
        <table><thead><tr><th>Mob</th><th>${esc(d.ours.title)}</th><th>${esc(d.theirs.title)}</th><th>Δ</th></tr></thead><tbody>`;
      for(const r of mm){

          <td class="num" style="color:var(--ours);font-weight:600">${r.ours}</td>

      }
      h+=`</tbody></table>`;

  /* Chain-pulling — how many mobs each raid pulls at once. Descriptive efficiency lever. */
  const cp=tr.chainPull;

    h+=`<h2 class="section">Chain-Pulling — Pull Size<span class="hint">How many mobs each raid pulls at once (a WCL trash segment is one pull). Bigger, fewer pulls = chain-pulling — a throughput lever and a wipe risk. <b>Descriptive, not scored.</b> We don't claim an exact "packs merged" count: WCL exposes no pack object.</span></h2>
    <div class="cards">
      <div class="card"><div class="label">Avg Mobs / Pull</div><div class="vals"><span class="v ours">${co.avg}</span><span class="v theirs">${ct.avg}</span><span class="delta ${avgD.cls}">${avgD.txt}</span></div></div>
      <div class="card"><div class="label">Biggest Pull (mobs)</div><div class="vals"><span class="v ours">${co.max}</span><span class="v theirs">${ct.max}</span></div></div>
      <div class="card"><div class="label">Large Pulls (≥${cp.bigThreshold} mobs)</div><div class="vals"><span class="v ours">${co.large}</span><span class="v theirs">${ct.large}</span></div></div>

  /* Trash deaths by pull SIZE (EXPERIMENTAL) — the honest decomposition of the flat trash-deaths count:

  const dps=rowsOf(tr.deathsByPullSize);
  if(dps.length){
    h+=`<h2 class="section">Trash Deaths by Pull Size<span class="xp">Experimental</span><span class="hint">Trash deaths as a <b>rate per pull</b>, bucketed by how many mobs the pull had, ours vs the benchmark. This is the one-level-deeper of the flat "Trash deaths" count — it shows <i>whether</i> the deaths come from big chain-pulls and whether the benchmark survives the same size. Death-rate per pull-of-size-N is comparable across guilds even though pull boundaries aren't. Raw deaths/pulls shown beside the rate (samples are small — read accordingly). <b>Experimental.</b> Lower rate is better.</span></h2>
    <table><thead><tr><th>Pull size (mobs)</th><th>${esc(d.ours.title)} deaths/pull</th><th>${esc(d.theirs.title)} deaths/pull</th><th>Δ</th></tr></thead><tbody>`;
    for(const r of dps){
      const cmp=(r.oursRate!=null&&r.theirsRate!=null);
      const dl=cmp?deltaLow(r.oursRate,r.theirsRate):null;
      const cell=(rate,deaths,pulls,who)=> pulls? `<span style="color:var(--${who});font-weight:600">${rate}</span> <span class="num" style="opacity:.6">(${deaths}d / ${pulls}p)</span>` : `<span class="num" style="opacity:.5">—</span>`;
      h+=`<tr><td style="font-weight:600">${esc(r.size)}</td>
        <td class="num">${cell(r.oursRate,r.oursDeaths,r.oursPulls,"ours")}</td>

    }
    h+=`</tbody></table>`;
  }

  // Lower Trash view, sub-tabbed to stay lean: Kill Order (default) | Crowd Control (drill-in).

  h+=`<h2 class="section">Kill Order &amp; Crowd Control<span class="hint">Two lenses for trash. <b>Kill Order</b> — how your target priority compares to the benchmark. <b>Crowd Control</b> — which mobs each raid neutralizes. Both descriptive, not scored.</span></h2>

    <div class="bsub" data-ttab="cc">${trashCcView(tr,d)}</div>`;
  return h;
}
// Kill Order body — nested Same-Pack Matches (clean 1:1) | Pairwise Priority (broad) sub-tabs.
function killOrderBody(tr,d){

    <div class="btabs">
      <button class="btab on" data-ktab="same">Same-Pack Matches</button>
      <button class="btab" data-ktab="pair">Pairwise Priority</button>
    </div>
    <div class="bsub active" data-ktab="same">${sameMatchesBody(tr)}</div>
    <div class="bsub" data-ktab="pair">${pairwiseBody(tr,d)}</div>`;

// SAME-PACK sub-tab body: packs both raids pulled with the EXACT same roster (names + counts),
// your kill order vs the benchmark's, first → last. Mobs you focus out of position are highlighted.
function sameMatchesBody(tr){
  const rows=rowsOf(tr.identicalPacks);
  if(!rows.length) return `<p class="num" style="padding:8px 2px">No trash pack was pulled with the exact same roster (same mobs and counts) by both raids — there's no clean 1:1 kill order to show here. The <b>Pairwise Priority</b> tab compares target priority across all pulls instead.</p>`;
  let h=`<p class="srcs" style="margin:2px 0 12px">Packs both raids pulled with the <b>exact same roster</b> (mob types and counts) — so merged/chain-pulls are excluded. Your order (top) vs the benchmark's, first → last; a <span class="tkmob div" style="padding:0 6px">highlighted</span> mob is one you kill in a clearly different spot. Sorted by how differently the two raids ordered the pack.</p>`;
  for(const r of rows){
    const roster=asArr(r.roster).map(m=>`${esc(m.name)}${m.count>1?` ×${m.count}`:''}`).join(" · ");
    const np=(r.oursPulls===1&&r.theirsPulls===1)?"pull":"pulls";
    h+=`<div class="tko">
      <div class="tkpack">${roster} <span class="num" style="font-weight:400">· you ${r.oursPulls} / bench ${r.theirsPulls} ${np}</span></div>
      <div class="tkrow"><span class="tklbl cours">You</span><span class="tkseq">${killSeq(r.ours,r.theirs)}</span></div>
      <div class="tkrow"><span class="tklbl cthe">Benchmark</span><span class="tkseq">${killSeq(r.theirs,r.ours)}</span></div>
    </div>`;
  }
  return h;
}
// PAIRWISE sub-tab body: the ranking ladder (visual) + the per-pair head-to-head table.
function pairwiseBody(tr,d){
  const ladder=killLadder(tr.killPriority);
  const rows=rowsOf(tr.pairwisePriority);
  if(!ladder && !rows.length) return `<p class="num" style="padding:8px 2px">Not enough trash mob types co-occurred in both reports to compare priority.</p>`;
  let h="";
  if(ladder) h+=`<div class="ladder">${ladder}</div>`;
  if(rows.length){
    h+=`<p class="srcs" style="margin:2px 0 8px">For every pair of trash mobs both raids fought together, how often each kills the first before the second — biggest difference first. A <span class="warnpill">flagged</span> row is an outright reversal (opposite order). Rates over the pulls where both were present.</p>
      <table><thead><tr><th>Target priority</th><th>${esc(d.ours.title)}</th><th>${esc(d.theirs.title)}</th><th>Diff</th></tr></thead><tbody>`;
    for(const r of rows){
      const lead=r.reversed?`<span class="warnpill">${esc(r.lead)}</span>`:esc(r.lead);
      h+=`<tr><td>kill ${lead} before ${esc(r.trail)} <span class="num" style="font-weight:400">· you ${r.oursPulls} / bench ${r.theirsPulls} pulls</span></td>
        <td class="num" style="color:var(--ours);font-weight:600">${r.ours}%</td>
        <td class="num" style="color:var(--theirs);font-weight:600">${r.theirs}%</td>
        <td class="delta flat">${r.divergence}</td></tr>`;
    }
    h+=`</tbody></table>`;
  }
  return h;
}
// The ranking ladder (slopegraph): your kill order left (first at top), benchmark right, mobs
// connected across; steep highlighted lines = mobs focused much earlier/later than the benchmark.
function killLadder(rows){
  rows=rowsOf(rows).filter(r=>r.both && r.ours!=null && r.theirs!=null);
  if(rows.length<2) return "";
  const ourOrder=[...rows].sort((a,b)=>(b.ours-a.ours)||a.mob.localeCompare(b.mob));
  const theirOrder=[...rows].sort((a,b)=>(b.theirs-a.theirs)||a.mob.localeCompare(b.mob));
  const orank={},trank={}; ourOrder.forEach((r,i)=>orank[r.mob]=i); theirOrder.forEach((r,i)=>trank[r.mob]=i);
  const n=rows.length, rowH=28, padT=34, padB=16, W=800, H=padT+n*rowH+padB;
  const llx=330, rlx=470, lL=338, lR=462, y=k=>padT+k*rowH+rowH/2;
  const big=r=>Math.abs(r.ours-r.theirs)>=34;
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block;font-family:inherit">`;
  s+=`<text x="${llx}" y="20" text-anchor="end" style="font-size:11px;font-weight:700;fill:var(--ours)">${esc(DATA.ours.title)} — kill first ↓</text>`;
  s+=`<text x="${rlx}" y="20" text-anchor="start" style="font-size:11px;font-weight:700;fill:var(--theirs)">${esc(DATA.theirs.title)} — kill first ↓</text>`;
  for(const r of rows){
    const ly=y(orank[r.mob]), ry=y(trank[r.mob]), b=big(r);
    s+=`<line x1="${lL}" y1="${ly}" x2="${lR}" y2="${ry}" style="stroke:${b?'var(--warn)':'var(--line)'};stroke-width:${b?2.5:1.3};stroke-opacity:${b?0.95:0.5}"/>`;
    s+=`<circle cx="${lL}" cy="${ly}" r="3" style="fill:var(--ours)"/><circle cx="${lR}" cy="${ry}" r="3" style="fill:var(--theirs)"/>`;
  }
  for(const r of ourOrder){const ly=y(orank[r.mob]),b=big(r);
    s+=`<text x="${llx-7}" y="${ly+4}" text-anchor="end" style="font-size:12px;fill:${b?'var(--warn)':'var(--txt)'};font-weight:${b?700:400}">${orank[r.mob]+1}. ${esc(r.mob)}</text>`;}
  for(const r of theirOrder){const ry=y(trank[r.mob]),b=big(r);
    s+=`<text x="${rlx+7}" y="${ry+4}" text-anchor="start" style="font-size:12px;fill:${b?'var(--warn)':'var(--txt)'};font-weight:${b?700:400}">${trank[r.mob]+1}. ${esc(r.mob)}</text>`;}
  return s+`</svg>`;
}
// One kill-order sequence as chips with arrows; a mob in a different slot than the other side is flagged.
function killSeq(seq,other){
  seq=asArr(seq); const orank={}; asArr(other).forEach((m,i)=>orank[m]=i);
  return seq.map((m,i)=>{
    const o=orank[m];
    const div=(o==null)||o!==i; // different position (or absent) than the other raid's order
    return `<span class="tkmob${div?' div':''}">${esc(m)}</span>`;
  }).join('<span class="tkarrow">→</span>');
}
// Crowd control on trash — DESCRIPTIVE (more isn't better; the benchmark sets the bar). Only the
// by-mob breakdown is shown: it's the actionable view (which caster to CC). The old overall by-type
// summary table was cut — its totals are implied by the per-mob rows and added no signal a leader acts on.
function trashCcView(tr,d){
  const byMob=rowsOf(tr.ccByMob);
  if(!byMob.length) return `<p class="num" style="padding:8px 2px">Neither raid used hard crowd control (Polymorph, Banish, Sap, Shackle, Freezing Trap, Repentance, …) on trash.</p>`;
  let h=`<p class="srcs" style="margin:2px 0 12px">Which mobs each raid neutralizes with hard CC (Polymorph, Banish, Sap, Shackle, Freezing Trap, …), by type and how often, ours vs the benchmark — grouped per mob, most-CC'd first. <b>Descriptive, not better/worse</b> — a raid that safely AoEs trash may need little CC. A mob the benchmark CCs heavily and you don't is a caster you should be neutralizing.</p>
    <table><thead><tr><th>Mob</th><th>Crowd control</th><th>${esc(d.ours.title)}</th><th>${esc(d.theirs.title)}</th></tr></thead><tbody>`;
  let prev=null;
  for(const r of byMob){
    const mobCell = r.mob!==prev ? `<td class="pname">${esc(r.mob)}</td>` : `<td></td>`;
    prev=r.mob;
    h+=`<tr>${mobCell}<td>${esc(r.cc)}</td>
      <td class="num" style="color:var(--ours);font-weight:600">${r.ours}</td>
      <td class="num" style="color:var(--theirs);font-weight:600">${r.theirs}</td></tr>`;
  }
  return h+`</tbody></table>`;
}
// Trash sub-tabs: outer Kill Order | Crowd Control (data-ttab), and the nested Same-Pack | Pairwise
// inside Kill Order (data-ktab). Native toggle, no re-render. Both groups wired the same way.
function mountTrash(){
  const el=document.getElementById("p-trash"); if(!el) return;
  const wire=attr=>el.querySelectorAll(`.btab[data-${attr}]`).forEach(t=>t.addEventListener("click",()=>{
    const k=t.dataset[attr];
    el.querySelectorAll(`.btab[data-${attr}]`).forEach(x=>x.classList.toggle("on",x.dataset[attr]===k));
    el.querySelectorAll(`.bsub[data-${attr}]`).forEach(x=>x.classList.toggle("active",x.dataset[attr]===k));
  }));
  wire("ttab"); wire("ktab");
}
/* ---------- WIPES (per-boss progression: the wall, the trend, the tax, what ends attempts) ---------- */

  </div>`;

        <div class="card"><div class="label">Closest Attempt</div><div class="vals"><span class="v ours">${pct(b.bestPct)}${b.bestPhase?` <span class="num" style="font-size:12px">(${esc(b.bestPhase)})</span>`:""}</span></div></div>
        <div class="card"><div class="label">Time Wiping</div><div class="vals"><span class="v ours">${mmss(b.wipeTimeSec)}</span></div></div>
      </div>`;
    if(b.wall&&b.wall.phase){

    }

      h+=`<p class="srcs" style="margin:8px 0 2px"><b>Trend:</b> ${esc(b.trend)}</p>${viz}`;

        else if(s>=2*m&&s>0) verdict=`a <b style="color:var(--bad)">sustained-damage problem</b> — ${s}/${tot} deaths to melee/attrition, not single mechanics. That's a <b>healing-assignment / defensive / gear / tuning</b> question, not a positioning drill.`;
        else verdict=`<b>mixed</b> — ${m}/${tot} to avoidable mechanics (${mechs}), ${s}/${tot} to sustained damage. Split the fix: positioning for the first, healing/CDs for the second.`;
        h+=`<p class="srcs" style="margin:4px 0 4px"><b>Likely cause:</b> ${verdict} <span class="num" style="opacity:.6">— heuristic from the death-window damage mix; it can't see a missed defensive, and "avoidable" = a named non-melee killing hit.</span></p>`;
      }
      const kb=rowsOf(b.killingBlows);
      if(kb.length){
        h+=`<table><thead><tr><th>Killing blow on wipes</th><th>Deaths</th></tr></thead><tbody>`;
        for(const r of kb) h+=`<tr><td style="font-weight:600">${esc(r.cause)}</td><td class="num">${r.count}</td></tr>`;
        h+=`</tbody></table>`;
      }
    } else if(!w.hasDeaths){
      h+=`<p class="srcs" style="margin:8px 0 0;opacity:.7">Per-wipe death detail (what ends the attempts) appears after the next data refresh — it draws on a newly added fetch.</p>`;
    }
    h+=`</div>`;
  }
  /* Wipe Recovery (EXPERIMENTAL) — reset/rebuff/re-pull pace between a wipe and the next pull. Moved here
     from Execution in the /audit pass: it's wipe-pacing, so it belongs on the Wipes tab. */
  h+=wipeRecoveryView(d);
  return h;
}
function render(){
  const d=DATA; if(!d){document.getElementById("app").innerHTML="<p>No data.</p>";return;}
  let h=`<header class="hero">
    <div class="kicker">${esc(d.zone||"Raid")} · Performance Comparison</div>
    <h1>Raid Benchmark Report</h1>
    <div class="matchup"><span class="team ours">${esc(d.ours.title)}</span><span class="vs">vs</span><span class="team theirs">${esc(d.theirs.title)}</span></div>
    <div class="sub"><span class="dot ours"></span>${esc(d.ours.title)} &nbsp; <span class="dot theirs"></span>${esc(d.theirs.title)} &nbsp;·&nbsp; ${d.summary.bossCount} shared bosses</div>
  </header>
  <div class="tabs"><div class="tab active" data-t="overview">Overview</div><div class="tab" data-t="composition">Composition</div><div class="tab" data-t="enchants">Prep</div><div class="tab" data-t="execution">Execution</div><div class="tab" data-t="bosses">Bosses</div><div class="tab" data-t="wipes">Wipes</div><div class="tab" data-t="optimize">Optimize</div><div class="tab" data-t="trash">Trash</div></div>
  <div class="panel active" id="p-overview">${renderOverview(d)}</div>
  <div class="panel" id="p-composition">${renderComposition(d)}</div>
  <div class="panel" id="p-enchants">${renderEnchants(d)}</div>
  <div class="panel" id="p-execution"></div>
  <div class="panel" id="p-bosses"></div>
  <div class="panel" id="p-wipes">${renderWipes(d)}</div>
  <div class="panel" id="p-optimize">${renderOptimize(d)}</div>
  <div class="panel" id="p-trash">${renderTrash(d)}</div>
  <footer>Generated by warcraft-logs-analyzer · data via Warcraft Logs v2 API · parse colors are role-appropriate percentiles</footer>`;
  document.getElementById("app").innerHTML=h;
  mountExecution();
  mountBosses();
  mountOptimize();
  mountTrash();
  wrapTables(); // wrap tables in the statically-rendered panels (Overview, Composition, Prep, Trash)
  document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    document.getElementById("p-"+t.dataset.t).classList.add("active");
  }));
}
render();
</script>
